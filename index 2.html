<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Halo Football">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Halo Football</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --muted: #6b6b7a;
  --accent: #7c6af7;
  --accent2: #4fc3f7;
  --green: #4ade80;
  --red: #f87171;
  --amber: #fbbf24;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  padding: calc(var(--safe-top) + 16px) 20px 0;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.logo {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.clock {
  font-size: 13px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.refresh-btn {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  color: var(--muted);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.15s;
  user-select: none;
}
.refresh-btn:active { transform: scale(0.92); background: var(--bg2); }
.refresh-btn.spinning { animation: spin 0.6s linear; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--bg2);
  border-radius: 12px;
  padding: 3px;
  margin-bottom: 0;
  border: 0.5px solid var(--border);
}

.tab {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-radius: 9px;
  transition: all 0.2s;
  font-family: var(--font-head);
  letter-spacing: 0.3px;
  user-select: none;
}

.tab.active {
  background: var(--bg3);
  color: var(--text);
  border: 0.5px solid var(--border2);
}

/* ── CONTENT ── */
.content {
  padding: 12px 16px calc(var(--safe-bot) + 20px);
}

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ── LOADING ── */
.loading {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
  font-size: 13px;
}

.loader {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 1.5px;
  font-family: var(--font-head);
  text-transform: uppercase;
  padding: 14px 4px 6px;
}
.section-label:first-child { padding-top: 4px; }

/* ── MATCH CARD ── */
.match-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  transition: border-color 0.2s;
}

.match-card.live {
  border-color: rgba(124, 106, 247, 0.3);
  background: linear-gradient(135deg, #0f0e1a 0%, #111118 100%);
}

.match-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.match-comp {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--font-head);
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 65%;
}

.badge {
  font-size: 9px;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 5px;
  font-family: var(--font-head);
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.badge-live {
  background: rgba(248, 113, 113, 0.15);
  color: var(--red);
  border: 0.5px solid rgba(248,113,113,0.3);
  animation: badge-pulse 1.5s ease-in-out infinite;
}
@keyframes badge-pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.badge-ft { background: rgba(107,107,122,0.15); color: var(--muted); border: 0.5px solid var(--border); }
.badge-ht { background: rgba(79,195,247,0.12); color: var(--accent2); border: 0.5px solid rgba(79,195,247,0.25); }
.badge-soon { background: rgba(251,191,36,0.1); color: var(--amber); border: 0.5px solid rgba(251,191,36,0.2); }

.teams-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
}

.team-home { display: flex; align-items: center; gap: 8px; }
.team-away { display: flex; align-items: center; gap: 8px; flex-direction: row-reverse; }

.flag { font-size: 20px; flex-shrink: 0; }

.team-name {
  font-family: var(--font-head);
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.team-home .team-name { text-align: left; }
.team-away .team-name { text-align: right; }

.score-center {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-shrink: 0;
}

.score-num {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  min-width: 22px;
  text-align: center;
  line-height: 1;
}

.score-sep {
  font-size: 16px;
  color: var(--muted);
  font-weight: 400;
}

.time-center {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  color: var(--accent2);
  text-align: center;
  white-space: nowrap;
}

.match-minute {
  text-align: center;
  font-size: 11px;
  color: var(--green);
  margin-top: 8px;
  font-variant-numeric: tabular-nums;
}

.match-minute::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 5px;
  vertical-align: middle;
  animation: badge-pulse 1.2s infinite;
}

/* ── GOALSCORERS ── */
.scorers {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.scorer-line {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.scorer-line::before {
  content: '⚽';
  font-size: 10px;
}

/* ── CALENDAR ── */
.cal-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.cal-time {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 700;
  color: var(--accent2);
  min-width: 44px;
  flex-shrink: 0;
}

.cal-info { flex: 1; min-width: 0; }

.cal-teams {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.cal-comp {
  font-size: 10px;
  color: var(--muted);
}

/* ── STANDINGS ── */
.stand-table {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 16px;
}

.stand-head {
  display: grid;
  grid-template-columns: 20px 1fr 26px 26px 26px 26px 30px 44px;
  gap: 2px;
  padding: 8px 12px;
  font-size: 10px;
  color: var(--muted);
  font-family: var(--font-head);
  letter-spacing: 0.5px;
  border-bottom: 0.5px solid var(--border);
}

.stand-head span, .stand-row span { text-align: center; }
.stand-head span:nth-child(2), .stand-row span:nth-child(2) { text-align: left; }

.stand-row {
  display: grid;
  grid-template-columns: 20px 1fr 26px 26px 26px 26px 30px 44px;
  gap: 2px;
  padding: 8px 12px;
  font-size: 12px;
  border-top: 0.5px solid var(--border);
  align-items: center;
  transition: background 0.15s;
}

.stand-row:first-child { border-top: none; }
.stand-row.qual { background: rgba(74, 222, 128, 0.04); }
.stand-row.euro { background: rgba(79, 195, 247, 0.04); }

.stand-pos { color: var(--muted); font-size: 11px; text-align: center; }

.stand-team {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
  overflow: hidden;
}

.stand-team-name {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stand-pts {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  text-align: center;
}

.stand-stat { color: var(--muted); font-size: 11px; text-align: center; }

.form-row {
  display: flex;
  gap: 2px;
  justify-content: center;
}

.form-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── QUAL LEGEND ── */
.legend {
  display: flex;
  gap: 12px;
  padding: 4px 4px 10px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--muted);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* ── EMPTY / ERROR ── */
.empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.8;
}

.error-box {
  background: rgba(248,113,113,0.08);
  border: 0.5px solid rgba(248,113,113,0.2);
  border-radius: 12px;
  padding: 14px;
  font-size: 12px;
  color: #fca5a5;
  margin: 8px 0;
  line-height: 1.6;
}

/* ── FOOTER ── */
.footer {
  padding: 0 20px 6px;
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  border-top: 0.5px solid var(--border);
  padding-top: 8px;
  margin-top: 2px;
}

.wifi-ok { color: var(--green); }

/* ── SEPARATOR ── */
.day-sep {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--font-head);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px 4px 5px;
  border-top: 0.5px solid var(--border);
  margin-top: 4px;
}
.day-sep:first-child { border-top: none; margin-top: 0; padding-top: 4px; }

.league-title {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  padding: 14px 4px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.league-title:first-child { padding-top: 4px; }

.league-title::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

/* ── INSTALL BANNER ── */
.install-banner {
  background: linear-gradient(135deg, rgba(124,106,247,0.15), rgba(79,195,247,0.1));
  border: 0.5px solid rgba(124,106,247,0.3);
  border-radius: 14px;
  padding: 14px 16px;
  margin: 8px 16px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.install-banner.hidden { display: none; }
.install-text { flex: 1; font-size: 12px; line-height: 1.5; }
.install-text strong { font-family: var(--font-head); font-size: 13px; display: block; margin-bottom: 2px; }
.install-text span { color: var(--muted); font-size: 11px; }
.install-icon { font-size: 22px; flex-shrink: 0; }
.install-close { color: var(--muted); font-size: 18px; padding: 4px; cursor: pointer; flex-shrink: 0; }

/* ── TOP DIVIDER ── */
.top-divider {
  height: 0.5px;
  background: var(--border);
  margin: 10px 0 0;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-dot"></div>
      Halo Football
    </div>
    <div class="header-right">
      <span class="clock" id="clock">--:--</span>
      <div class="refresh-btn" id="refreshBtn" onclick="refreshAll()" title="Actualiser">↻</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab(0)">En direct</div>
    <div class="tab" onclick="showTab(1)">Calendrier</div>
    <div class="tab" onclick="showTab(2)">Classements</div>
  </div>
  <div class="top-divider"></div>
</div>

<div id="installBanner" class="install-banner hidden">
  <div class="install-icon">📲</div>
  <div class="install-text">
    <strong>Installer l'appli</strong>
    <span>Ajouter à l'écran d'accueil pour un accès rapide</span>
  </div>
  <div class="install-close" onclick="closeBanner()">×</div>
</div>

<div class="content">
  <div class="page active" id="p0">
    <div class="loading"><div class="loader"></div>Chargement des matchs...</div>
  </div>
  <div class="page" id="p1">
    <div class="loading"><div class="loader"></div>Chargement du calendrier...</div>
  </div>
  <div class="page" id="p2">
    <div class="loading"><div class="loader"></div>Chargement des classements...</div>
  </div>
</div>

<div class="footer">
  <span id="lastUpdate">Connexion...</span>
  <span class="wifi-ok">● connecté</span>
</div>

<script>
const API_KEY = '7585468b7f104d31a14311eafac3ba86';
const BASE = 'https://api.football-data.org/v4';

const LEAGUES = [
  { id: '2015', name: 'Ligue 1', qual: 3, euro: 5 },
  { id: '2021', name: 'Premier League', qual: 4, euro: 6 },
  { id: '2014', name: 'La Liga', qual: 4, euro: 6 },
  { id: '2019', name: 'Serie A', qual: 4, euro: 6 },
  { id: '2002', name: 'Bundesliga', qual: 4, euro: 6 },
  { id: '2001', name: 'Champions League', qual: 2, euro: 0 },
];

function flag(code) {
  if (!code || code.length < 2) return '🏳';
  try {
    return String.fromCodePoint(...[...code.toUpperCase().slice(0,2)].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
  } catch(e) { return '🏳'; }
}

async function get(url) {
  const target = BASE + url;
  const proxied = 'https://corsproxy.io/?' + encodeURIComponent(target);
  const r = await fetch(proxied, { headers: { 'X-Auth-Token': API_KEY } });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function badgeHtml(status) {
  if (status === 'IN_PLAY') return '<span class="badge badge-live">● LIVE</span>';
  if (status === 'PAUSED')  return '<span class="badge badge-ht">MI-TEMPS</span>';
  if (status === 'FINISHED') return '<span class="badge badge-ft">TERMINÉ</span>';
  return '';
}

function localTime(utcDate) {
  const d = new Date(utcDate);
  return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function localDateLabel(utcDate) {
  const d = new Date(utcDate);
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  if (d.toDateString() === today.toDateString()) return "Aujourd'hui";
  if (d.toDateString() === tomorrow.toDateString()) return 'Demain';
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function renderMatchCard(m) {
  const home = m.homeTeam?.shortName || m.homeTeam?.name || '?';
  const away = m.awayTeam?.shortName || m.awayTeam?.name || '?';
  const hf = flag(m.homeTeam?.area?.code);
  const af = flag(m.awayTeam?.area?.code);
  const isLive = ['IN_PLAY', 'PAUSED'].includes(m.status);
  const isDone = m.status === 'FINISHED';
  const hs = m.score?.fullTime?.home ?? m.score?.halfTime?.home;
  const as_ = m.score?.fullTime?.away ?? m.score?.halfTime?.away;
  const showScore = (isLive || isDone) && hs !== null && hs !== undefined;

  let scoreHtml = showScore
    ? `<div class="score-center"><span class="score-num">${hs}</span><span class="score-sep">–</span><span class="score-num">${as_}</span></div>`
    : `<div class="time-center">${localTime(m.utcDate)}</div>`;

  let minuteHtml = '';
  if (isLive && m.minute) minuteHtml = `<div class="match-minute">${m.minute}'</div>`;
  if (m.status === 'PAUSED') minuteHtml = `<div class="match-minute" style="color:var(--accent2)">Mi-temps</div>`;

  let scorersHtml = '';
  if (m.goals && m.goals.length > 0) {
    const lines = m.goals.map(g =>
      `<div class="scorer-line">${g.scorer?.name || '?'} ${g.minute}'${g.team?.shortName ? ' · ' + g.team.shortName : ''}</div>`
    ).join('');
    scorersHtml = `<div class="scorers">${lines}</div>`;
  }

  return `<div class="match-card ${isLive ? 'live' : ''}">
    <div class="match-meta">
      <span class="match-comp">${m.competition?.name || ''}</span>
      ${badgeHtml(m.status)}
    </div>
    <div class="teams-row">
      <div class="team-home"><span class="flag">${hf}</span><span class="team-name">${home}</span></div>
      ${scoreHtml}
      <div class="team-away"><span class="team-name">${away}</span><span class="flag">${af}</span></div>
    </div>
    ${minuteHtml}
    ${scorersHtml}
  </div>`;
}

async function loadLive() {
  const p = document.getElementById('p0');
  try {
    const data = await get('/matches?status=IN_PLAY,PAUSED,FINISHED&limit=30');
    const now = Date.now();
    const matches = (data.matches || []).filter(m => {
      if (m.status === 'FINISHED') return (now - new Date(m.utcDate).getTime()) < 14 * 3600000;
      return true;
    });

    if (!matches.length) {
      p.innerHTML = `<div class="empty">Aucun match en ce moment<br><span style="font-size:11px;color:var(--muted)">Consultez le calendrier pour les prochains matchs</span></div>`;
      return;
    }

    const live = matches.filter(m => ['IN_PLAY','PAUSED'].includes(m.status));
    const done = matches.filter(m => m.status === 'FINISHED');

    let html = '';
    if (live.length) {
      html += `<div class="section-label">En cours · ${live.length} match${live.length > 1 ? 's' : ''}</div>`;
      live.forEach(m => html += renderMatchCard(m));
    }
    if (done.length) {
      html += `<div class="section-label">Terminés aujourd'hui</div>`;
      done.forEach(m => html += renderMatchCard(m));
    }
    p.innerHTML = html;
  } catch(e) {
    p.innerHTML = `<div class="error-box">Impossible de charger les matchs<br><small>${e.message}</small></div>`;
  }
}

async function loadCalendar() {
  const p = document.getElementById('p1');
  try {
    const today = new Date().toISOString().slice(0,10);
    const end = new Date(Date.now() + 10 * 86400000).toISOString().slice(0,10);
    const data = await get(`/matches?status=SCHEDULED,TIMED&dateFrom=${today}&dateTo=${end}&limit=60`);
    const matches = data.matches || [];

    if (!matches.length) {
      p.innerHTML = `<div class="empty">Aucun match prévu dans les 10 prochains jours</div>`;
      return;
    }

    const byDay = {};
    matches.forEach(m => {
      const key = localDateLabel(m.utcDate);
      if (!byDay[key]) byDay[key] = [];
      byDay[key].push(m);
    });

    let html = '';
    Object.entries(byDay).forEach(([day, ms]) => {
      html += `<div class="day-sep">${day}</div>`;
      ms.forEach(m => {
        const home = m.homeTeam?.shortName || m.homeTeam?.name || '?';
        const away = m.awayTeam?.shortName || m.awayTeam?.name || '?';
        const hf = flag(m.homeTeam?.area?.code);
        const af = flag(m.awayTeam?.area?.code);
        html += `<div class="cal-card">
          <div class="cal-time">${localTime(m.utcDate)}</div>
          <div class="cal-info">
            <div class="cal-teams">${hf} ${home} — ${af} ${away}</div>
            <div class="cal-comp">${m.competition?.name || ''}</div>
          </div>
        </div>`;
      });
    });
    p.innerHTML = html;
  } catch(e) {
    p.innerHTML = `<div class="error-box">Impossible de charger le calendrier<br><small>${e.message}</small></div>`;
  }
}

async function loadStandings() {
  const p = document.getElementById('p2');
  let html = `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(74,222,128,0.5)"></div>Champions League</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(79,195,247,0.4)"></div>Europa League</div>
  </div>`;

  for (const league of LEAGUES) {
    try {
      const data = await get(`/competitions/${league.id}/standings`);
      const standing = (data.standings || []).find(s => s.type === 'TOTAL');
      if (!standing) continue;

      const table = standing.table || [];
      html += `<div class="league-title">${league.name}</div>`;
      html += `<div class="stand-table">
        <div class="stand-head">
          <span>#</span><span>Équipe</span>
          <span>J</span><span>G</span><span>N</span><span>D</span>
          <span>Pts</span><span>Forme</span>
        </div>`;

      const max = Math.min(table.length, league.id === '2001' ? 8 : 10);
      table.slice(0, max).forEach((t, i) => {
        const f = flag(t.team?.area?.code);
        const name = t.team?.shortName || t.team?.name || '?';
        const isQual = i < league.qual;
        const isEuro = !isQual && i < (league.qual + league.euro);

        const formDots = (t.form || '').split(',').filter(Boolean).slice(-5).map(r => {
          const c = r === 'W' ? '#4ade80' : r === 'D' ? '#4fc3f7' : '#f87171';
          return `<div class="form-pip" style="background:${c}"></div>`;
        }).join('');

        const rowClass = isQual ? 'qual' : isEuro ? 'euro' : '';
        html += `<div class="stand-row ${rowClass}">
          <span class="stand-pos">${t.position}</span>
          <div class="stand-team">
            <span style="font-size:14px">${f}</span>
            <span class="stand-team-name">${name}</span>
          </div>
          <span class="stand-stat">${t.playedGames}</span>
          <span class="stand-stat">${t.won}</span>
          <span class="stand-stat">${t.draw}</span>
          <span class="stand-stat">${t.lost}</span>
          <span class="stand-pts">${t.points}</span>
          <div class="form-row">${formDots}</div>
        </div>`;
      });

      html += '</div>';
      p.innerHTML = html;
      await new Promise(r => setTimeout(r, 300));
    } catch(e) {
      html += `<div class="error-box" style="margin-bottom:8px">${league.name} : ${e.message}</div>`;
      p.innerHTML = html;
    }
  }
  p.innerHTML = html;
}

function showTab(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', i === j));
  document.querySelectorAll('.page').forEach((p, j) => p.classList.toggle('active', i === j));
}

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('lastUpdate').textContent = 'Actualisation...';

  const activeIdx = [...document.querySelectorAll('.page')].findIndex(p => p.classList.contains('active'));

  await Promise.all([
    loadLive(),
    loadCalendar(),
    loadStandings()
  ]);

  const n = new Date();
  document.getElementById('lastUpdate').textContent =
    'MàJ ' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');

  setTimeout(() => btn.classList.remove('spinning'), 600);
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.remove('hidden');
});

document.getElementById('installBanner').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
  closeBanner();
});

function closeBanner() {
  document.getElementById('installBanner').classList.add('hidden');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

updateClock();
setInterval(updateClock, 15000);
refreshAll();
setInterval(refreshAll, 60000);
</script>
</body>
</html>
