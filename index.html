<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050810">
<title>Veher Live v1.1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--bg2:#080d18;--om:#009BDE;--white:#f0f6ff;--dim:#7a9fc0;--f:'Outfit',sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--white);font-family:var(--f);overflow:hidden;height:100vh;}

/* Header fixe pour boîtier */
header{padding:15px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border-bottom:1px solid #1a253a;}
#logo{font-weight:900;font-size:22px;color:var(--om);letter-spacing:-1px;}
#clk{font-variant-numeric:tabular-nums;font-weight:600;color:var(--dim);}

/* Navigation Tactile Agrandie */
nav{display:flex;background:var(--bg2);padding:5px;gap:5px;border-bottom:1px solid #1a253a;}
.tab{flex:1;padding:12px 5px;text-align:center;font-size:13px;font-weight:600;color:var(--dim);border-radius:8px;transition:0.2s;}
.tab.on{background:rgba(0,155,222,0.15);color:var(--om);}

/* Contenu */
.page{display:none;height:calc(100vh - 120px);overflow-y:auto;padding:15px;}
.page.on{display:block;}

/* Cartes de match optimisées Bureau */
.mc{background:var(--bg2);border-radius:15px;padding:20px;margin-bottom:15px;border:1px solid #1a253a;box-shadow:0 4px 15px rgba(0,0,0,0.3);}
.l-n{font-size:12px;color:var(--om);font-weight:700;margin-bottom:12px;text-transform:uppercase;display:flex;justify-content:space-between;}
.m-g{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.t-c{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
.t-c img{width:45px;height:45px;margin-bottom:8px;}
.t-n{font-size:14px;font-weight:600;line-height:1.2;height:34px;}
.scn{font-size:42px;font-weight:900;letter-spacing:-2px;flex:1;text-align:center;}
.m-st{text-align:center;font-size:13px;font-weight:700;color:var(--om);margin-top:10px;}
.live-dot{display:inline-block;width:8px;height:8px;background:#ff3b30;border-radius:50%;margin-right:5px;animation:pulse 1s infinite;}

@keyframes pulse{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}

/* Timer spécial écran vide */
#empty-state{text-align:center;padding-top:40px;}
.timer-val{font-size:48px;font-weight:900;color:var(--white);display:block;}

#rbtn{position:fixed;bottom:20px;right:20px;width:50px;height:50px;background:var(--om);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 10px rgba(0,0,0,0.5);z-index:100;}
.spin{animation:rotate 0.5s linear;}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
    <div id="logo" onmousedown="startDemo()" onmouseup="endDemo()">VEHER LIVE</div>
    <div id="clk">00:00</div>
</header>

<nav>
    <div class="tab on" id="t0" onclick="goTab(0)">DIRECT</div>
    <div class="tab" id="t1" onclick="goTab(1)">CALENDRIER</div>
    <div class="tab" id="t2" onclick="goTab(2)">RÉSULTATS</div>
    <div class="tab" id="t3" onclick="goTab(3)">OM</div>
</nav>

<div id="p0" class="page on"></div>
<div id="p1" class="page"></div>
<div id="p2" class="page"></div>
<div id="p3" class="page"></div>

<div id="rbtn" onclick="manualRefresh()">↻</div>

<script>
let demoActive = false;
let demoTimer;

// API ESPN Mondiale
const WORLD_API = "https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard";
const OM_ID = "81"; // ID Marseille chez ESPN

async function fetchData(url) {
    try {
        const r = await fetch(url);
        return await r.json();
    } catch (e) { return null; }
}

function goTab(i) {
    document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('on', i===j));
    document.querySelectorAll('.page').forEach((p,j) => p.classList.toggle('on', i===j));
    if(i===0) loadLive();
    if(i===1) loadCal();
    if(i===2) loadResults();
    if(i===3) loadOM();
}

function renderMatch(m) {
    const status = m.status.type.state;
    const isLive = status === "in";
    return `
    <div class="mc">
        <div class="l-n">
            <span>${m.league?.name || 'FOOTBALL'}</span>
            ${isLive ? '<span style="color:#ff3b30"><span class="live-dot"></span>LIVE</span>' : ''}
        </div>
        <div class="m-g">
            <div class="t-c">
                <img src="${m.competitions[0].competitors[0].team.logo}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/teamlogos/soccer/500/default-soccer.png&w=50'">
                <div class="t-n">${m.competitions[0].competitors[0].team.shortDisplayName}</div>
            </div>
            <div class="scn">${m.competitions[0].competitors[0].score}-${m.competitions[0].competitors[1].score}</div>
            <div class="t-c">
                <img src="${m.competitions[0].competitors[1].team.logo}" onerror="this.src='https://a.espncdn.com/combiner/i?img=/i/teamlogos/soccer/500/default-soccer.png&w=50'">
                <div class="t-n">${m.competitions[0].competitors[1].team.shortDisplayName}</div>
            </div>
        </div>
        <div class="m-st">${isLive ? m.status.type.detail : m.status.type.shortDetail}</div>
    </div>`;
}

async function loadLive() {
    const container = document.getElementById('p0');
    const data = await fetchData(WORLD_API);
    if(!data) return;

    const lives = data.events.filter(e => e.status.type.state === "in");
    
    if(lives.length > 0) {
        container.innerHTML = lives.map(renderMatch).join('');
    } else {
        // Si rien en direct, on cherche le prochain match
        const upcoming = data.events.filter(e => e.status.type.state === "pre").sort((a,b) => new Date(a.date) - new Date(b.date));
        if(upcoming.length > 0) {
            const next = upcoming[0];
            const startTime = new Date(next.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            container.innerHTML = `
                <div id="empty-state">
                    <p style="color:var(--dim)">AUCUN MATCH EN DIRECT</p>
                    <p>PROCHAIN MATCH À</p>
                    <span class="timer-val">${startTime}</span>
                    <p style="margin-top:20px; color:var(--om)">${next.name}</p>
                </div>`;
        } else {
            container.innerHTML = "<p style='text-align:center;margin-top:40px'>AUCUN MATCH AUJOURD'HUI</p>";
        }
    }
}

// Autres onglets simplifiés et fiables
async function loadCal() { 
    const data = await fetchData(WORLD_API);
    document.getElementById('p1').innerHTML = data.events.filter(e => e.status.type.state === "pre").map(renderMatch).join('');
}
async function loadResults() { 
    const data = await fetchData(WORLD_API);
    document.getElementById('p2').innerHTML = data.events.filter(e => e.status.type.state === "post").map(renderMatch).join('');
}
async function loadOM() {
    const data = await fetchData(WORLD_API);
    const omMatches = data.events.filter(e => e.competitions[0].competitors.some(c => c.id === OM_ID));
    document.getElementById('p3').innerHTML = omMatches.length ? omMatches.map(renderMatch).join('') : "<p style='text-align:center;margin-top:40px'>L'OM NE JOUE PAS AUJOURD'HUI</p>";
}

function updateClock() {
    const now = new Date();
    document.getElementById('clk').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

// Protection d'écran (décalage de 1px pour éviter le marquage)
function burnInProtection() {
    document.body.style.paddingLeft = (Math.random() * 2) + "px";
    document.body.style.paddingTop = (Math.random() * 2) + "px";
}

function manualRefresh() {
    const btn = document.getElementById('rbtn');
    btn.classList.add('spin');
    loadLive();
    setTimeout(() => btn.classList.remove('spin'), 600);
}

// Logique Demo Match
function startDemo() { demoTimer = setTimeout(() => { alert("Mode Démo activé"); }, 2000); }
function endDemo() { clearTimeout(demoTimer); }

// Init
setInterval(updateClock, 1000);
setInterval(loadLive, 30000);
setInterval(burnInProtection, 60000);
updateClock();
loadLive();

</script>
</body>
</html>
