<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Veher Live v1.6.1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--bg2:#080d18;--bg3:#0d1428;--om:#009BDE;--om2:#38bdf8;--white:#f0f6ff;--dim:#7a9fc0;--muted:#243650;--b1:rgba(0,155,222,0.1);--b2:rgba(0,155,222,0.25);--f:'Outfit',sans-serif;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--f);min-height:100dvh;overflow-x:hidden}
.hdr{padding:calc(var(--sat) + 18px) 20px 0;background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:36px;height:36px;border-radius:10px;background:var(--om);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;box-shadow:0 0 16px rgba(0,155,222,.5);flex-shrink:0}
.logo-text{font-size:21px;font-weight:800;color:var(--white);letter-spacing:-.3px}.logo-text span{color:var(--om)}
.rbtn{background:var(--bg3);border:1px solid var(--b2);color:var(--om);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tabs-wrap{display:flex;gap:8px;padding:0 0 14px;overflow-x:auto;scrollbar-width:none}.tabs-wrap::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;color:var(--dim);background:var(--bg2);border:1px solid var(--muted);cursor:pointer;white-space:nowrap}
.tab.on{background:var(--om);color:#fff;border-color:var(--om);box-shadow:0 0 16px rgba(0,155,222,.35)}
.content{padding:4px 16px calc(var(--sab) + 28px)}
.page{display:none}.page.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.sr{width:22px;height:22px;border:2.5px solid var(--bg3);border-top-color:var(--om);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.sec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.8px;padding:14px 2px 8px;text-transform:uppercase}
.mc{background:var(--bg2);border:1px solid var(--b1);border-radius:18px;padding:14px 15px;margin-bottom:10px}
.mc.live{border-color:var(--b2);background:linear-gradient(150deg,#060c1e 0%,#080d18 100%)}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mc-comp{font-size:11px;color:var(--dim);font-weight:600}
.badge{font-size:9px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.b-live{background:rgba(0,155,222,.18);color:var(--om);border:1px solid rgba(0,155,222,.35)}
.b-ft{background:rgba(36,54,80,.4);color:var(--muted);border:1px solid var(--muted)}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.th{display:flex;align-items:center;gap:9px}.ta{display:flex;align-items:center;gap:9px;flex-direction:row-reverse}
.cr{width:32px;height:32px;object-fit:contain}
.tn{font-size:14px;font-weight:800;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scb{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--bg3);border-radius:14px;border:1px solid var(--b2)}
.scn{font-size:24px;font-weight:900}.scs{font-size:14px;color:var(--muted)}

/* --- STYLE DU NOUVEAU BOUTON & PANNEAU --- */
.det-btn{background:var(--bg3);border:1px solid var(--b2);color:var(--om);padding:6px 14px;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;margin-top:12px;width:100%;text-transform:uppercase;letter-spacing:0.5px}
.det-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bg3);animation:fi .2s ease}
.det-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:5px;color:var(--dim)}
.det-row.away{justify-content:flex-end}
.gmin{color:var(--om);font-weight:800;font-size:10px}

.cal-card{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.cal-t{font-size:17px;font-weight:800;color:var(--om);min-width:46px}
.day-sep{font-size:11px;color:var(--om2);font-weight:700;padding:14px 2px 6px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo"><div class="logo-mark">VL</div><div class="logo-text">Veher <span>Live</span></div></div>
    <div class="rbtn" onclick="manualRefresh()">↻</div>
  </div>
  <div class="tabs-wrap">
    <div class="tab on" id="t0" onclick="goTab(0)"><span>⚽</span>Live</div>
    <div class="tab" id="t1" onclick="goTab(1)"><span>📅</span>Calendrier</div>
    <div class="tab" id="t2" onclick="goTab(2)"><span>🏁</span>Résultats</div>
    <div class="tab" id="t3" onclick="goTab(3)"><span>🔵</span>OM</div>
  </div>
</div>

<div class="content">
  <div class="page on" id="p0"><div class="loading"><div class="sr"></div>Chargement...</div></div>
  <div class="page" id="p1"></div>
  <div class="page" id="p2"></div>
  <div class="page" id="p3"></div>
</div>

<script>
const BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer';
const LEAGUES = [
  { slug: 'fra.1', name: 'Ligue 1' },
  { slug: 'uefa.champions', name: 'Champions League' },
  { slug: 'eng.1', name: 'Premier League' },
  { slug: 'esp.1', name: 'LaLiga' },
  { slug: 'ita.1', name: 'Serie A' },
  { slug: 'ger.1', name: 'Bundesliga' }
];
let liveEvents = [], finishedEvents = [];

// --- FONCTIONS API ---
async function espn(s, p='') { const r = await fetch(`${BASE}/${s}/scoreboard${p}`); return r.json(); }
async function espnSum(s, id) { const r = await fetch(`${BASE}/${s}/summary?event=${id}`); return r.json(); }

// --- LOGIQUE DE DÉTAILS (AU CLIC) ---
async function toggleDetails(eventId, leagueSlug, btn) {
  const panel = document.getElementById('det-' + eventId);
  if (!panel) return;

  if (panel.style.display === 'block') {
    panel.style.display = 'none';
    btn.textContent = 'Détails';
    return;
  }

  if (panel.innerHTML === '') {
    panel.innerHTML = '<div class="sr"></div>';
    panel.style.display = 'block';
    btn.textContent = 'Fermer';

    try {
      const s = await espnSum(leagueSlug || 'all', eventId);
      const events = s?.header?.competitions?.[0]?.details || [];
      const homeId = s?.header?.competitions?.[0]?.competitors?.find(c => c.homeAway === 'home')?.id;
      
      if (!events.length) {
        panel.innerHTML = '<div style="text-align:center;font-size:11px;color:var(--muted)">Détails non disponibles</div>';
        return;
      }

      let h = '';
      events.forEach(e => {
        const type = String(e.type?.text || '').toLowerCase();
        const icon = type.includes('goal') ? '⚽' : (type.includes('red') ? '🟥' : (type.includes('yellow') ? '🟨' : '•'));
        const pName = e.athletesInvolved?.[0]?.displayName || e.athlete?.displayName || 'Joueur';
        const isAway = e.team?.id && String(e.team.id) !== String(homeId);
        
        h += `<div class="det-row ${isAway?'away':''}">
          ${isAway ? '' : icon} <span>${pName} <small class="gmin">${e.clock?.displayValue || ''}</small></span> ${isAway ? icon : ''}
        </div>`;
      });
      panel.innerHTML = h;
    } catch (e) {
      panel.innerHTML = '<div style="text-align:center;font-size:11px;color:var(--muted)">Erreur de chargement</div>';
    }
  } else {
    panel.style.display = 'block';
    btn.textContent = 'Fermer';
  }
}

// --- RENDU DES CARTES ---
function normalize(ev, lName, lSlug) {
  const c = ev.competitions[0], h = c.competitors.find(x => x.homeAway === 'home'), a = c.competitors.find(x => x.homeAway === 'away');
  return {
    id:ev.id, leagueName:lName, leagueSlug:lSlug, date:ev.date,
    homeName:h.team.shortDisplayName, awayName:a.team.shortDisplayName,
    homeLogo:h.team.logo, awayLogo:a.team.logo,
    homeScore:h.score, awayScore:a.score, status:c.status
  };
}

function renderMatch(m) {
  const isLive = m.status.type.state === 'in' || m.status.type.shortDetail === 'HT';
  const isDone = m.status.type.state === 'post';
  
  return `
    <div class="mc ${isLive ? 'live' : ''}">
      <div class="mc-top">
        <span class="mc-comp">${m.leagueName}</span>
        <span class="badge ${isLive?'b-live':'b-ft'}">${isLive ? m.status.type.shortDetail : (isDone ? 'Terminé' : 'À venir')}</span>
      </div>
      <div class="teams">
        <div class="th"><img src="${m.homeLogo}" class="cr"><span class="tn">${m.homeName}</span></div>
        <div class="scb"><span class="scn">${m.homeScore}</span><span class="scs">-</span><span class="scn">${m.awayScore}</span></div>
        <div class="ta"><span class="tn">${m.awayName}</span><img src="${m.awayLogo}" class="cr"></div>
      </div>
      ${isDone ? `
        <button class="det-btn" onclick="toggleDetails('${m.id}', '${m.leagueSlug}', this)">Détails</button>
        <div id="det-${m.id}" class="det-panel"></div>
      ` : ''}
    </div>`;
}

// --- NAVIGATION & LOGIQUE ---
async function loadLive() {
  try {
    const results = await Promise.allSettled(LEAGUES.map(l => espn(l.slug).then(d => ({l, d}))));
    let all = [];
    results.forEach(r => { if(r.status==='fulfilled') r.value.d.events?.forEach(ev => all.push(normalize(ev, r.value.l.name, r.value.l.slug))); });
    
    liveEvents = all.filter(m => m.status.type.state === 'in' || m.status.type.shortDetail === 'HT');
    finishedEvents = all.filter(m => m.status.type.state === 'post');
    
    document.getElementById('p0').innerHTML = liveEvents.length ? `<div class="sec">En direct</div>` + liveEvents.map(m => renderMatch(m)).join('') : '<div class="empty">Aucun match en direct</div>';
  } catch(e) { document.getElementById('p0').innerHTML = 'Erreur...'; }
}

async function loadCal() {
  const p = document.getElementById('p1'); p.innerHTML = '<div class="sr"></div>';
  try {
    const d = await espn('all'); // Simplifié pour le calendrier
    const matches = (d.events || []).filter(ev => ev.status.type.state === 'pre');
    p.innerHTML = `<div class="sec">Prochains matchs</div>` + matches.map(ev => {
      const m = normalize(ev, 'Football', 'all');
      return `<div class="cal-card"><div class="cal-t">${new Date(m.date).getHours()}:${String(new Date(m.date).getMinutes()).padStart(2,'0')}</div><div class="cal-i"><div class="cal-tn">${m.homeName} - ${m.awayName}</div></div></div>`;
    }).join('');
  } catch(e) { p.innerHTML = 'Erreur calendrier'; }
}

function goTab(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('on', i === j));
  document.querySelectorAll('.page').forEach((p, j) => p.classList.toggle('on', i === j));
  if (i === 1) loadCal();
  if (i === 2) document.getElementById('p2').innerHTML = `<div class="sec">Résultats récents</div>` + finishedEvents.map(m => renderMatch(m)).join('');
}

async function manualRefresh() { await loadLive(); goTab(0); }

loadLive();
</script>
</body>
</html>
