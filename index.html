<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Halo Football">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>Halo Football</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c26;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eeeef5;--muted:#5a5a72;--accent:#7c6af7;--blue:#4fc3f7;--green:#4ade80;--red:#f87171;--head:'Syne',sans-serif;--mono:'DM Mono',monospace;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100dvh;overflow-x:hidden}
.hdr{padding:calc(var(--sat) + 14px) 18px 0;background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{font-family:var(--head);font-weight:800;font-size:21px;display:flex;align-items:center;gap:9px;letter-spacing:-0.5px}
.lp{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:pp 2.5s ease-in-out infinite}
@keyframes pp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.hdr-r{display:flex;align-items:center;gap:8px}
.clk{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.rbtn{background:var(--bg3);border:0.5px solid var(--border2);color:var(--muted);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;user-select:none;transition:.15s}
.rbtn:active{transform:scale(.9)}
.rbtn.spin{animation:spinr .6s linear}
@keyframes spinr{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:12px;padding:3px;border:0.5px solid var(--border)}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:9px;transition:.2s;font-family:var(--head);user-select:none}
.tab.on{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2)}
.divider{height:.5px;background:var(--border);margin:12px 0 0}
.content{padding:10px 14px calc(var(--sab) + 24px)}
.page{display:none}.page.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:52px 20px;color:var(--muted);font-size:12px}
.sr{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spinr .7s linear infinite;margin:0 auto 12px}
.sec{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.8px;font-family:var(--head);padding:12px 2px 6px;text-transform:uppercase}
.sec:first-child{padding-top:4px}
.mc{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:12px 14px;margin-bottom:8px}
.mc.live{border-color:rgba(124,106,247,.35);background:linear-gradient(145deg,#0f0e1c,#13131a)}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:6px}
.mc-comp{font-size:10px;color:var(--muted);font-family:var(--head);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%}
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:var(--head);white-space:nowrap;letter-spacing:.5px}
.b-live{background:rgba(248,113,113,.15);color:var(--red);border:.5px solid rgba(248,113,113,.3);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.b-ht{background:rgba(79,195,247,.12);color:var(--blue);border:.5px solid rgba(79,195,247,.25)}
.b-ft{background:rgba(90,90,114,.15);color:var(--muted);border:.5px solid var(--border)}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.th{display:flex;align-items:center;gap:8px}
.ta{display:flex;align-items:center;gap:8px;flex-direction:row-reverse}
.cr{width:28px;height:28px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
.cr-e{width:28px;height:28px;background:var(--bg3);border-radius:50%;flex-shrink:0;border:.5px solid var(--border2)}
.tn{font-family:var(--head);font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.th .tn{text-align:left}.ta .tn{text-align:right}
.scb{display:flex;align-items:center;gap:6px;flex-shrink:0;padding:0 4px}
.scn{font-family:var(--head);font-size:28px;font-weight:800;color:var(--text);min-width:24px;text-align:center;line-height:1}
.scs{font-size:18px;color:var(--muted)}
.sct{font-family:var(--head);font-size:20px;font-weight:700;color:var(--blue);text-align:center;white-space:nowrap}
.mc-min{text-align:center;font-size:11px;color:var(--green);margin-top:8px}
.mc-min::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle;animation:blink 1.2s infinite}
.scorers{margin-top:9px;padding-top:9px;border-top:.5px solid var(--border);display:flex;flex-direction:column;gap:4px}
.gl{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px}
.cal-card{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.cal-t{font-family:var(--head);font-size:16px;font-weight:700;color:var(--blue);min-width:42px;flex-shrink:0}
.cal-cc{display:flex;align-items:center;gap:3px;flex-shrink:0}
.ccr{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.ccr-e{width:22px;height:22px;background:var(--bg3);border-radius:50%;border:.5px solid var(--border2)}
.cal-i{flex:1;min-width:0}
.cal-tn{font-family:var(--head);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cal-cn{font-size:10px;color:var(--muted)}
.day-sep{font-size:10px;color:var(--muted);font-family:var(--head);text-transform:uppercase;letter-spacing:1.2px;padding:12px 2px 5px;border-top:.5px solid var(--border);margin-top:4px}
.day-sep:first-child{border-top:none;margin-top:0;padding-top:2px}
.lhdr{font-family:var(--head);font-size:13px;font-weight:800;color:var(--text);padding:16px 2px 7px;display:flex;align-items:center;gap:8px}
.lhdr:first-child{padding-top:4px}
.lhdr::after{content:'';flex:1;height:.5px;background:var(--border)}
.sb{background:var(--bg2);border:.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.sth{display:grid;grid-template-columns:18px 1fr 24px 24px 24px 24px 28px 40px;gap:2px;padding:7px 10px;font-size:9px;color:var(--muted);font-family:var(--head);letter-spacing:.5px;border-bottom:.5px solid var(--border)}
.str{display:grid;grid-template-columns:18px 1fr 24px 24px 24px 24px 28px 40px;gap:2px;padding:8px 10px;font-size:12px;border-top:.5px solid var(--border);align-items:center}
.str:first-child{border-top:none}
.str.chl{background:rgba(74,222,128,.05)}
.str.eur{background:rgba(79,195,247,.04)}
.sp{color:var(--muted);font-size:11px;text-align:center}
.st{display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden}
.scr{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.scr-e{width:18px;height:18px;background:var(--bg3);border-radius:50%;flex-shrink:0}
.sn{font-family:var(--head);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss{color:var(--muted);font-size:11px;text-align:center}
.spt{font-family:var(--head);font-size:13px;font-weight:800;color:var(--green);text-align:center}
.fr{display:flex;gap:2px;justify-content:center}
.fp{width:7px;height:7px;border-radius:50%}
.legend{display:flex;gap:12px;padding:2px 2px 10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.ld{width:8px;height:8px;border-radius:2px}
.err{background:rgba(248,113,113,.07);border:.5px solid rgba(248,113,113,.18);border-radius:12px;padding:12px 14px;font-size:11px;color:#fca5a5;margin:6px 0;line-height:1.6}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px;line-height:1.9}
.ftr{padding:8px 18px 6px;display:flex;justify-content:space-between;font-size:10px;color:var(--muted);border-top:.5px solid var(--border);margin-top:2px}
.ok{color:var(--green)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo"><div class="lp"></div>Halo Football</div>
    <div class="hdr-r">
      <span class="clk" id="clk">--:--</span>
      <div class="rbtn" id="rbtn" onclick="doRefresh()">↻</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="goTab(0)">En direct</div>
    <div class="tab" onclick="goTab(1)">Calendrier</div>
    <div class="tab" onclick="goTab(2)">Classements</div>
  </div>
  <div class="divider"></div>
</div>
<div class="content">
  <div class="page on" id="p0"><div class="loading"><div class="sr"></div>Chargement...</div></div>
  <div class="page" id="p1"><div class="loading"><div class="sr"></div>Chargement...</div></div>
  <div class="page" id="p2"><div class="loading"><div class="sr"></div>Chargement...</div></div>
</div>
<div class="ftr"><span id="upd">Connexion...</span><span class="ok">● connecté</span></div>

<script>
const KEY='7585468b7f104d31a14311eafac3ba86';
const BASE='https://api.football-data.org/v4';
const ALLOWED=[2015,2021,2014,2019,2002,2001,2018];
const CNAMES={2015:'Ligue 1',2021:'Premier League',2014:'La Liga',2019:'Serie A',2002:'Bundesliga',2001:'Champions League',2018:'Europa League'};
const LEAGUES=[
  {id:2021,name:'Premier League',chl:4,eur:2},
  {id:2014,name:'La Liga',chl:4,eur:2},
  {id:2019,name:'Serie A',chl:4,eur:3},
  {id:2002,name:'Bundesliga',chl:4,eur:2},
  {id:2015,name:'Ligue 1',chl:3,eur:2},
  {id:2001,name:'Champions League',chl:2,eur:0},
  {id:2018,name:'Europa League',chl:2,eur:0},
];

async function api(url) {
  const t=BASE+url;
  for(const p of ['https://api.allorigins.win/raw?url='+encodeURIComponent(t),'https://corsproxy.io/?'+encodeURIComponent(t)]) {
    try { const r=await fetch(p,{headers:{'X-Auth-Token':KEY}}); if(r.ok) return await r.json(); } catch(e){}
  }
  throw new Error('API inaccessible');
}

function img(src,sz,cls) {
  if(!src) return `<div class="${cls}-e" style="width:${sz}px;height:${sz}px"></div>`;
  return `<img src="${src}" class="${cls}" width="${sz}" height="${sz}" loading="lazy" onerror="this.outerHTML='<div class=&quot;${cls}-e&quot; style=&quot;width:${sz}px;height:${sz}px&quot;></div>'">`;
}

function bdg(s) {
  if(s==='IN_PLAY') return '<span class="badge b-live">● LIVE</span>';
  if(s==='PAUSED')  return '<span class="badge b-ht">MI-TEMPS</span>';
  if(s==='FINISHED') return '<span class="badge b-ft">TERMINÉ</span>';
  return '';
}

function lt(u){return new Date(u).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}

function dl(u){
  const d=new Date(u),t=new Date(),tm=new Date(t);tm.setDate(tm.getDate()+1);
  if(d.toDateString()===t.toDateString()) return"Aujourd'hui";
  if(d.toDateString()===tm.toDateString()) return'Demain';
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}

function matchCard(m) {
  const hn=m.homeTeam?.shortName||m.homeTeam?.name||'?';
  const an=m.awayTeam?.shortName||m.awayTeam?.name||'?';
  const hc=m.homeTeam?.crest||'';
  const ac=m.awayTeam?.crest||'';
  const live=['IN_PLAY','PAUSED'].includes(m.status);
  const done=m.status==='FINISHED';
  const hs=m.score?.fullTime?.home??m.score?.halfTime?.home;
  const as_=m.score?.fullTime?.away??m.score?.halfTime?.away;
  const showSc=(live||done)&&hs!=null;
  const cn=CNAMES[m.competition?.id]||m.competition?.name||'';
  const scHtml=showSc
    ?`<div class="scb"><span class="scn">${hs}</span><span class="scs">–</span><span class="scn">${as_}</span></div>`
    :`<div class="sct">${lt(m.utcDate)}</div>`;
  const minHtml=live&&m.minute?`<div class="mc-min">${m.status==='PAUSED'?'Mi-temps':m.minute+"'"}</div>`:'';
  let sc='';
  if(m.goals?.length){
    sc='<div class="scorers">'+m.goals.map(g=>`<div class="gl"><span>⚽</span><span>${g.scorer?.name||'?'} ${g.minute}'${g.team?.shortName?' · '+g.team.shortName:''}</span></div>`).join('')+'</div>';
  }
  return `<div class="mc${live?' live':''}">
    <div class="mc-top"><span class="mc-comp">${cn}</span>${bdg(m.status)}</div>
    <div class="teams">
      <div class="th">${img(hc,28,'cr')}<span class="tn">${hn}</span></div>
      ${scHtml}
      <div class="ta"><span class="tn">${an}</span>${img(ac,28,'cr')}</div>
    </div>${minHtml}${sc}</div>`;
}

async function loadLive() {
  const p=document.getElementById('p0');
  try {
    const d=await api('/matches?status=IN_PLAY,PAUSED,FINISHED&limit=50');
    const now=Date.now();
    const all=(d.matches||[]).filter(m=>{
      if(!ALLOWED.includes(m.competition?.id)) return false;
      if(m.status==='FINISHED') return now-new Date(m.utcDate).getTime()<14*3600000;
      return true;
    });
    if(!all.length){p.innerHTML=`<div class="empty">Aucun match en cours<br><span style="font-size:11px;opacity:.6">Voir le calendrier pour les prochains matchs</span></div>`;return;}
    const live=all.filter(m=>['IN_PLAY','PAUSED'].includes(m.status));
    const done=all.filter(m=>m.status==='FINISHED');
    let h='';
    if(live.length){h+=`<div class="sec">En cours · ${live.length} match${live.length>1?'s':''}</div>`;live.forEach(m=>h+=matchCard(m));}
    if(done.length){h+=`<div class="sec">Terminés aujourd'hui</div>`;done.forEach(m=>h+=matchCard(m));}
    p.innerHTML=h;
  } catch(e){p.innerHTML=`<div class="err">Erreur<br><small>${e.message}</small></div>`;}
}

async function loadCal() {
  const p=document.getElementById('p1');
  try {
    const today=new Date().toISOString().slice(0,10);
    const end=new Date(Date.now()+10*86400000).toISOString().slice(0,10);
    const d=await api(`/matches?status=SCHEDULED,TIMED&dateFrom=${today}&dateTo=${end}&limit=100`);
    const ms=(d.matches||[]).filter(m=>ALLOWED.includes(m.competition?.id));
    if(!ms.length){p.innerHTML=`<div class="empty">Aucun match prévu</div>`;return;}
    const byDay={};
    ms.forEach(m=>{const k=dl(m.utcDate);if(!byDay[k])byDay[k]=[];byDay[k].push(m);});
    let h='';
    Object.entries(byDay).forEach(([day,arr])=>{
      h+=`<div class="day-sep">${day}</div>`;
      arr.forEach(m=>{
        const hn=m.homeTeam?.shortName||m.homeTeam?.name||'?';
        const an=m.awayTeam?.shortName||m.awayTeam?.name||'?';
        const cn=CNAMES[m.competition?.id]||m.competition?.name||'';
        h+=`<div class="cal-card">
          <div class="cal-t">${lt(m.utcDate)}</div>
          <div class="cal-cc">${img(m.homeTeam?.crest||'',22,'ccr')}${img(m.awayTeam?.crest||'',22,'ccr')}</div>
          <div class="cal-i"><div class="cal-tn">${hn} — ${an}</div><div class="cal-cn">${cn}</div></div>
        </div>`;
      });
    });
    p.innerHTML=h;
  } catch(e){p.innerHTML=`<div class="err">Erreur<br><small>${e.message}</small></div>`;}
}

async function loadStand() {
  const p=document.getElementById('p2');
  let h=`<div class="legend"><div class="li"><div class="ld" style="background:rgba(74,222,128,.5)"></div>Ligue des champions</div><div class="li"><div class="ld" style="background:rgba(79,195,247,.4)"></div>Europa League</div></div>`;
  p.innerHTML=h+'<div class="loading"><div class="sr"></div>Chargement...</div>';
  for(const lg of LEAGUES) {
    try {
      const d=await api(`/competitions/${lg.id}/standings`);
      const st=(d.standings||[]).find(s=>s.type==='TOTAL');
      if(!st) continue;
      const tbl=st.table||[];
      const max=Math.min(tbl.length,lg.id===2001||lg.id===2018?6:10);
      h+=`<div class="lhdr">${lg.name}</div><div class="sb">`;
      h+=`<div class="sth"><span>#</span><span>Équipe</span><span>J</span><span>G</span><span>N</span><span>D</span><span>Pts</span><span>Forme</span></div>`;
      tbl.slice(0,max).forEach((t,i)=>{
        const cls=i<lg.chl?'chl':i<(lg.chl+lg.eur)?'eur':'';
        const form=(t.form||'').split(',').filter(Boolean).slice(-5).map(r=>`<div class="fp" style="background:${r==='W'?'#4ade80':r==='D'?'#4fc3f7':'#f87171'}"></div>`).join('');
        h+=`<div class="str ${cls}">
          <span class="sp">${t.position}</span>
          <div class="st">${img(t.team?.crest||'',18,'scr')}<span class="sn">${t.team?.shortName||t.team?.name||'?'}</span></div>
          <span class="ss">${t.playedGames}</span><span class="ss">${t.won}</span><span class="ss">${t.draw}</span><span class="ss">${t.lost}</span>
          <span class="spt">${t.points}</span>
          <div class="fr">${form}</div>
        </div>`;
      });
      h+='</div>';
      p.innerHTML=h;
      await new Promise(r=>setTimeout(r,220));
    } catch(e){h+=`<div class="err" style="margin-bottom:8px">${lg.name} : ${e.message}</div>`;p.innerHTML=h;}
  }
}

function goTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',i===j));
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('on',i===j));
}

function updateClk(){
  const n=new Date();
  document.getElementById('clk').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

async function doRefresh(){
  const btn=document.getElementById('rbtn');
  btn.classList.add('spin');
  document.getElementById('upd').textContent='Actualisation...';
  await Promise.all([loadLive(),loadCal(),loadStand()]);
  const n=new Date();
  document.getElementById('upd').textContent='MàJ '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  setTimeout(()=>btn.classList.remove('spin'),600);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
updateClk();
setInterval(updateClk,15000);
doRefresh();
setInterval(doRefresh,60000);
</script>
</body>
</html>
