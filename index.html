<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Veher Live">
<meta name="theme-color" content="#050810">
<link rel="manifest" href="manifest.json">
<title>Veher Live</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;
  --bg2:#080d18;
  --bg3:#0d1428;
  --bg4:#111e38;
  --om:#009BDE;
  --om2:#38bdf8;
  --white:#f0f6ff;
  --dim:#7a9fc0;
  --muted:#243650;
  --deep:#060e1a;
  --green:#34d399;
  --red:#f87171;
  --b1:rgba(0,155,222,0.1);
  --b2:rgba(0,155,222,0.25);
  --f:'Outfit',sans-serif;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--f);min-height:100dvh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}

/* ── HEADER ── */
.hdr{
  padding:calc(var(--sat) + 18px) 20px 0;
  background:var(--bg);
  position:sticky;top:0;z-index:100;
}
.hdr-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{
  width:36px;height:36px;border-radius:10px;
  background:var(--om);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;
  box-shadow:0 0 16px rgba(0,155,222,.5);
  flex-shrink:0;letter-spacing:-.5px;
}
.logo-text{font-size:21px;font-weight:800;color:var(--white);letter-spacing:-.3px}
.logo-text span{color:var(--om)}
.hdr-r{display:flex;align-items:center;gap:10px}
.clk{font-size:13px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.rbtn{
  background:var(--bg3);border:1px solid var(--b2);
  color:var(--om);width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;user-select:none;transition:.15s;
}
.rbtn:active{transform:scale(.88)}
.rbtn.spin{animation:spinr .6s linear}
@keyframes spinr{to{transform:rotate(360deg)}}

/* ── TABS — jolis, espacés, pill style ── */
.tabs-wrap{
  display:flex;
  gap:8px;
  padding:0 0 14px;
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;
  border-radius:50px;
  font-size:13px;font-weight:700;
  color:var(--dim);
  background:var(--bg2);
  border:1px solid var(--muted);
  cursor:pointer;user-select:none;
  transition:all .2s;white-space:nowrap;
  flex-shrink:0;
}
.tab:hover{border-color:var(--om);color:var(--white)}
.tab.on{
  background:var(--om);color:#fff;
  border-color:var(--om);
  box-shadow:0 0 16px rgba(0,155,222,.35);
}
.tab-icon{font-size:14px;line-height:1}
.tab-live-dot{
  width:7px;height:7px;border-radius:50%;
  background:#fff;
  animation:blink 1.3s infinite;
  flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CONTENT ── */
.content{padding:4px 16px calc(var(--sab) + 28px)}
.page{display:none}
.page.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── LOADING ── */
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;font-weight:500}
.sr{
  width:26px;height:26px;
  border:2.5px solid var(--bg3);
  border-top-color:var(--om);
  border-radius:50%;
  animation:spinr .7s linear infinite;
  margin:0 auto 14px;
}

/* ── SECTION LABEL ── */
.sec{
  font-size:11px;font-weight:700;color:var(--muted);
  letter-spacing:1.8px;padding:14px 2px 8px;
  text-transform:uppercase;
}
.sec:first-child{padding-top:4px}
.sec b{color:var(--om2)}

/* ── MATCH CARD ── */
.mc{
  background:var(--bg2);
  border:1px solid var(--b1);
  border-radius:18px;
  padding:14px 15px;
  margin-bottom:10px;
}
.mc.live{
  border-color:var(--b2);
  background:linear-gradient(150deg,#060c1e 0%,#080d18 100%);
  box-shadow:0 2px 24px rgba(0,155,222,.08);
}
.mc-top{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:12px;gap:6px;
}
.mc-comp{
  font-size:11px;color:var(--dim);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%;
}
.badge{
  font-size:9px;font-weight:800;padding:4px 10px;
  border-radius:20px;white-space:nowrap;letter-spacing:.5px;
  text-transform:uppercase;flex-shrink:0;
}
.b-live{background:rgba(0,155,222,.18);color:var(--om);border:1px solid rgba(0,155,222,.35);animation:blink 1.4s infinite}
.b-ht{background:rgba(56,189,248,.12);color:var(--om2);border:1px solid rgba(56,189,248,.25)}
.b-ft{background:rgba(36,54,80,.4);color:var(--muted);border:1px solid var(--muted)}

/* ── TEAMS ── */
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.th{display:flex;align-items:center;gap:9px}
.ta{display:flex;align-items:center;gap:9px;flex-direction:row-reverse}
.cr{width:32px;height:32px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 5px rgba(0,0,0,.7))}
.cr-e{width:32px;height:32px;background:var(--bg3);border-radius:50%;flex-shrink:0;border:1px solid var(--b2)}
.tn{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}
.th .tn{text-align:left}.ta .tn{text-align:right}

/* ── SCORE ── */
.scb{
  display:flex;align-items:center;gap:5px;
  flex-shrink:0;padding:5px 12px;
  background:var(--bg3);border-radius:14px;
  border:1px solid var(--b2);
}
.scn{font-size:28px;font-weight:900;color:var(--white);min-width:20px;text-align:center;line-height:1}
.scs{font-size:15px;color:var(--muted);font-weight:400}
.sct{
  font-size:19px;font-weight:800;color:var(--om2);
  text-align:center;white-space:nowrap;
  padding:5px 12px;background:rgba(56,189,248,.07);
  border-radius:12px;border:1px solid rgba(56,189,248,.15);
}

/* ── MINUTE ── */
.mc-min{
  text-align:center;font-size:12px;color:var(--om);
  margin-top:10px;font-weight:700;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.mc-min::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:var(--om);flex-shrink:0;
  box-shadow:0 0 7px var(--om);
  animation:blink 1.2s infinite;
}

/* ── BUTEURS ── section bien visible */
.scorers{
  margin-top:12px;
  background:rgba(0,155,222,.06);
  border-radius:12px;
  border:1px solid rgba(0,155,222,.15);
  overflow:hidden;
}
.scorers-hdr{
  padding:8px 12px 6px;
  font-size:9px;font-weight:800;
  color:var(--om);letter-spacing:1.8px;
  text-transform:uppercase;
  border-bottom:1px solid rgba(0,155,222,.1);
}
.goal-line{
  display:flex;align-items:center;gap:9px;
  padding:7px 12px;
  border-top:1px solid rgba(0,155,222,.06);
  font-size:13px;
}
.goal-line:first-of-type{border-top:none}
.goal-ball{font-size:14px;flex-shrink:0}
.goal-name{color:var(--white);font-weight:700}
.goal-min{color:var(--om);font-weight:700;font-size:12px;margin-left:3px}
.goal-team{color:var(--dim);font-size:11px;margin-left:2px}

/* ── CARTONS ── */
.bookings{
  margin-top:8px;display:flex;flex-direction:column;gap:4px;
  padding:0 2px;
}
.bk-line{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);font-weight:500}

/* ── CALENDRIER ── */
.cal-card{
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:14px;padding:12px 14px;margin-bottom:7px;
  display:flex;align-items:center;gap:12px;
}
.cal-t{font-size:17px;font-weight:800;color:var(--om);min-width:46px;flex-shrink:0}
.cal-cc{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ccr{width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
.ccr-e{width:24px;height:24px;background:var(--bg3);border-radius:50%;border:1px solid var(--b2)}
.cal-i{flex:1;min-width:0}
.cal-tn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;color:var(--white)}
.cal-cn{font-size:11px;color:var(--dim);font-weight:500}
.day-sep{
  font-size:11px;color:var(--om2);font-weight:700;
  letter-spacing:.5px;padding:14px 2px 6px;
  border-top:1px solid var(--bg3);margin-top:4px;
}
.day-sep:first-child{border-top:none;margin-top:0;padding-top:2px}

/* ── CLASSEMENTS ── */
.lhdr{
  font-size:14px;font-weight:800;color:var(--white);
  padding:18px 2px 8px;display:flex;align-items:center;gap:10px;
}
.lhdr:first-child{padding-top:4px}
.lhdr::after{content:'';flex:1;height:1px;background:var(--bg3)}
.lhdr span{color:var(--om)}
.sb{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:16px}
.sth{
  display:grid;grid-template-columns:20px 1fr 26px 26px 26px 26px 30px 44px;
  gap:2px;padding:8px 12px;font-size:9px;color:var(--muted);
  font-weight:700;letter-spacing:1px;border-bottom:1px solid var(--bg3);
  text-transform:uppercase;
}
.str{
  display:grid;grid-template-columns:20px 1fr 26px 26px 26px 26px 30px 44px;
  gap:2px;padding:9px 12px;border-top:1px solid var(--bg3);align-items:center;
}
.str:first-child{border-top:none}
.str.chl{background:rgba(0,155,222,.05)}
.str.eur{background:rgba(56,189,248,.04)}
.sp{color:var(--muted);font-size:11px;text-align:center;font-weight:700}
.st{display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden}
.scr{width:20px;height:20px;object-fit:contain;flex-shrink:0}
.scr-e{width:20px;height:20px;background:var(--bg3);border-radius:50%;flex-shrink:0}
.sn{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}
.ss{color:var(--muted);font-size:11px;text-align:center}
.spt{font-size:14px;font-weight:900;color:var(--om);text-align:center}
.fr{display:flex;gap:3px;justify-content:center}
.fp{width:7px;height:7px;border-radius:50%}
.legend{display:flex;gap:14px;padding:2px 2px 12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:600}
.ld{width:8px;height:8px;border-radius:2px}

/* ── ERREUR / VIDE ── */
.err{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:14px;padding:14px;font-size:13px;color:#fca5a5;margin:6px 0;line-height:1.7}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;line-height:2;font-weight:500}
.empty-icon{font-size:32px;display:block;margin-bottom:10px}

/* ── FOOTER ── */
.ftr{
  padding:8px 20px 6px;
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--muted);
  border-top:1px solid var(--bg3);
  font-weight:600;
}
.ok{color:var(--om)}
.upd-live{color:var(--om2)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-mark">VL</div>
      <div class="logo-text">Veher <span>Live</span></div>
    </div>
    <div class="hdr-r">
      <span class="clk" id="clk">--:--</span>
      <div class="rbtn" id="rbtn" onclick="manualRefresh()">↻</div>
    </div>
  </div>

  <!-- TABS JOLIS PILL STYLE -->
  <div class="tabs-wrap">
    <div class="tab on" id="t0" onclick="goTab(0)">
      <div class="tab-live-dot" id="liveDot" style="display:none"></div>
      <span class="tab-icon">⚽</span>
      En direct
    </div>
    <div class="tab" id="t1" onclick="goTab(1)">
      <span class="tab-icon">📅</span>
      Calendrier
    </div>
    <div class="tab" id="t2" onclick="goTab(2)">
      <span class="tab-icon">🏆</span>
      Classements
    </div>
  </div>
</div>

<div class="content">
  <div class="page on" id="p0">
    <div class="loading"><div class="sr"></div>Chargement des matchs...</div>
  </div>
  <div class="page" id="p1">
    <div class="loading"><div class="sr"></div>Chargement du calendrier...</div>
  </div>
  <div class="page" id="p2">
    <div class="loading"><div class="sr"></div>Chargement des classements...</div>
  </div>
</div>

<div class="ftr">
  <span id="upd">Connexion...</span>
  <span class="ok">● connecté</span>
</div>

<script>
const KEY = '7585468b7f104d31a14311eafac3ba86';
const BASE = 'https://api.football-data.org/v4';
const ALLOWED = [2015,2021,2014,2019,2002,2001,2018];
const CNAMES = {
  2015:'Ligue 1',2021:'Premier League',2014:'La Liga',
  2019:'Serie A',2002:'Bundesliga',2001:'Champions League',2018:'Europa League'
};
const LEAGUES = [
  {id:2021,name:'Premier League',chl:4,eur:2},
  {id:2014,name:'La Liga',chl:4,eur:2},
  {id:2019,name:'Serie A',chl:4,eur:3},
  {id:2002,name:'Bundesliga',chl:4,eur:2},
  {id:2015,name:'Ligue 1',chl:3,eur:2},
  {id:2001,name:'Champions League',chl:2,eur:0},
  {id:2018,name:'Europa League',chl:2,eur:0},
];

let calLoaded = false;
let standLoaded = false;
let liveInterval = null;

async function api(path) {
  const target = BASE + path;
  const proxies = [
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(target),
    'https://corsproxy.io/?' + encodeURIComponent(target),
  ];
  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy, {
        headers: {'X-Auth-Token': KEY},
        signal: AbortSignal.timeout(8000)
      });
      if (r.ok) return await r.json();
    } catch(e) { continue; }
  }
  throw new Error('API inaccessible');
}

function crest(src, sz, cls) {
  if (!src) return `<div class="${cls}-e" style="width:${sz}px;height:${sz}px"></div>`;
  return `<img src="${src.replace(/"/g,'&quot;')}" class="${cls}" width="${sz}" height="${sz}" loading="lazy" onerror="this.outerHTML='<div class=&quot;${cls}-e&quot; style=&quot;width:${sz}px;height:${sz}px&quot;></div>'">`;
}

function badge(s) {
  if (s==='IN_PLAY')  return '<span class="badge b-live">● LIVE</span>';
  if (s==='PAUSED')   return '<span class="badge b-ht">Mi-temps</span>';
  if (s==='FINISHED') return '<span class="badge b-ft">Terminé</span>';
  return '';
}

function lt(u) { return new Date(u).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

function dl(u) {
  const d=new Date(u),t=new Date(),tm=new Date();
  tm.setDate(tm.getDate()+1);
  if (d.toDateString()===t.toDateString()) return "Aujourd'hui";
  if (d.toDateString()===tm.toDateString()) return 'Demain';
  const s=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function renderMatch(m) {
  const hn  = m.homeTeam?.shortName||m.homeTeam?.name||'?';
  const an  = m.awayTeam?.shortName||m.awayTeam?.name||'?';
  const isLive = ['IN_PLAY','PAUSED'].includes(m.status);
  const isDone = m.status==='FINISHED';
  const hs  = m.score?.fullTime?.home??m.score?.halfTime?.home;
  const as_ = m.score?.fullTime?.away??m.score?.halfTime?.away;
  const showScore = (isLive||isDone) && hs!=null;
  const cn  = CNAMES[m.competition?.id]||m.competition?.name||'';

  const scoreHtml = showScore
    ? `<div class="scb"><span class="scn">${hs}</span><span class="scs">–</span><span class="scn">${as_}</span></div>`
    : `<div class="sct">${lt(m.utcDate)}</div>`;

  const minHtml = isLive
    ? `<div class="mc-min">${m.status==='PAUSED'?'Mi-temps':(m.minute?m.minute+"'":'En cours')}</div>`
    : '';

  // ── BUTEURS ──
  let scorersHtml = '';
  if (m.goals && m.goals.length > 0) {
    const lines = m.goals.map(g => {
      const name = g.scorer?.name||'?';
      const min  = g.minute!=null ? `<span class="goal-min">${g.minute}'</span>` : '';
      const team = g.team?.shortName ? `<span class="goal-team">· ${g.team.shortName}</span>` : '';
      return `<div class="goal-line"><span class="goal-ball">⚽</span><span><span class="goal-name">${name}</span>${min}${team}</span></div>`;
    }).join('');
    scorersHtml = `<div class="scorers"><div class="scorers-hdr">Buteurs</div>${lines}</div>`;
  }

  // ── CARTONS ──
  let bkHtml = '';
  if (m.bookings && m.bookings.length > 0) {
    const lines = m.bookings.map(b=>{
      const icon = b.card==='RED_CARD'?'🟥':'🟨';
      const min  = b.minute ? `${b.minute}'` : '';
      const team = b.team?.shortName ? ` · ${b.team.shortName}` : '';
      return `<div class="bk-line"><span>${icon}</span><span>${b.player?.name||'?'} ${min}${team}</span></div>`;
    }).join('');
    bkHtml = `<div class="bookings">${lines}</div>`;
  }

  return `<div class="mc${isLive?' live':''}">
    <div class="mc-top"><span class="mc-comp">${cn}</span>${badge(m.status)}</div>
    <div class="teams">
      <div class="th">${crest(m.homeTeam?.crest,32,'cr')}<span class="tn">${hn}</span></div>
      ${scoreHtml}
      <div class="ta"><span class="tn">${an}</span>${crest(m.awayTeam?.crest,32,'cr')}</div>
    </div>
    ${minHtml}${scorersHtml}${bkHtml}
  </div>`;
}

// ── LIVE : appel individuel par match pour vrai score + buteurs ──
async function loadLive(silent=false) {
  const p = document.getElementById('p0');
  if (!silent) p.innerHTML = '<div class="loading"><div class="sr"></div>Chargement...</div>';

  try {
    // 1. Liste des matchs en cours
    const d = await api('/matches?status=IN_PLAY,PAUSED,FINISHED&limit=50');
    const now = Date.now();
    let matches = (d.matches||[]).filter(m => {
      if (!ALLOWED.includes(m.competition?.id)) return false;
      if (m.status==='FINISHED') return now-new Date(m.utcDate).getTime()<14*3600000;
      return true;
    });

    if (!matches.length) {
      p.innerHTML = `<div class="empty"><span class="empty-icon">⚽</span>Aucun match en cours pour le moment<br><small style="font-size:11px;opacity:.5">Consulte le calendrier pour les prochains matchs</small></div>`;
      document.getElementById('liveDot').style.display = 'none';
      return;
    }

    // 2. Appel individuel pour chaque match en direct → vrai score + buteurs
    const liveMatches = matches.filter(m=>['IN_PLAY','PAUSED'].includes(m.status));
    if (liveMatches.length > 0) {
      document.getElementById('liveDot').style.display = 'block';
      const detailed = await Promise.allSettled(
        liveMatches.map(m => api(`/matches/${m.id}`))
      );
      detailed.forEach((r,i) => {
        if (r.status==='fulfilled' && r.value.match) {
          const idx = matches.findIndex(m=>m.id===liveMatches[i].id);
          if (idx>=0) matches[idx] = r.value.match;
        }
      });
    } else {
      document.getElementById('liveDot').style.display = 'none';
    }

    const live = matches.filter(m=>['IN_PLAY','PAUSED'].includes(m.status));
    const done = matches.filter(m=>m.status==='FINISHED');
    let h = '';
    if (live.length) {
      h += `<div class="sec">En cours · <b>${live.length} match${live.length>1?'s':''}</b></div>`;
      live.forEach(m => h += renderMatch(m));
    }
    if (done.length) {
      h += `<div class="sec">Terminés aujourd'hui</div>`;
      done.forEach(m => h += renderMatch(m));
    }
    p.innerHTML = h;

  } catch(e) {
    if (!silent) p.innerHTML = `<div class="err">Impossible de charger les matchs<br><small>${e.message}</small></div>`;
  }
}

// ── CALENDRIER : chargé une fois ──
async function loadCal() {
  const p = document.getElementById('p1');
  try {
    const today = new Date().toISOString().slice(0,10);
    const end = new Date(Date.now()+10*86400000).toISOString().slice(0,10);
    const results = await Promise.allSettled(
      ALLOWED.map(id=>api(`/competitions/${id}/matches?status=SCHEDULED,TIMED&dateFrom=${today}&dateTo=${end}&limit=20`))
    );
    let matches = [];
    results.forEach(r=>{ if(r.status==='fulfilled') matches.push(...(r.value.matches||[])); });
    const seen=new Set();
    matches = matches.filter(m=>{ if(seen.has(m.id)) return false; seen.add(m.id); return ALLOWED.includes(m.competition?.id); });
    matches.sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
    if (!matches.length) { p.innerHTML=`<div class="empty"><span class="empty-icon">📅</span>Aucun match prévu dans les 10 prochains jours</div>`; return; }
    const byDay={};
    matches.forEach(m=>{ const k=dl(m.utcDate); if(!byDay[k]) byDay[k]=[]; byDay[k].push(m); });
    let h='';
    Object.entries(byDay).forEach(([day,ms])=>{
      h+=`<div class="day-sep">${day}</div>`;
      ms.forEach(m=>{
        const hn=m.homeTeam?.shortName||m.homeTeam?.name||'?';
        const an=m.awayTeam?.shortName||m.awayTeam?.name||'?';
        const cn=CNAMES[m.competition?.id]||m.competition?.name||'';
        h+=`<div class="cal-card">
          <div class="cal-t">${lt(m.utcDate)}</div>
          <div class="cal-cc">${crest(m.homeTeam?.crest||'',24,'ccr')}${crest(m.awayTeam?.crest||'',24,'ccr')}</div>
          <div class="cal-i"><div class="cal-tn">${hn} — ${an}</div><div class="cal-cn">${cn}</div></div>
        </div>`;
      });
    });
    p.innerHTML=h;
    calLoaded=true;
  } catch(e) { p.innerHTML=`<div class="err">Erreur calendrier<br><small>${e.message}</small></div>`; }
}

// ── CLASSEMENTS : chargés une fois ──
async function loadStand() {
  const p = document.getElementById('p2');
  let h=`<div class="legend">
    <div class="li"><div class="ld" style="background:rgba(0,155,222,.6)"></div>Ligue des champions</div>
    <div class="li"><div class="ld" style="background:rgba(56,189,248,.5)"></div>Europa League</div>
  </div>`;
  p.innerHTML=h+'<div class="loading"><div class="sr"></div>Chargement...</div>';
  for (const lg of LEAGUES) {
    try {
      const d=await api(`/competitions/${lg.id}/standings`);
      const st=(d.standings||[]).find(s=>s.type==='TOTAL');
      if (!st) continue;
      const tbl=st.table||[];
      const max=Math.min(tbl.length,lg.id===2001||lg.id===2018?6:10);
      h+=`<div class="lhdr"><span>${lg.name}</span></div><div class="sb">`;
      h+=`<div class="sth"><span>#</span><span>Équipe</span><span>J</span><span>G</span><span>N</span><span>D</span><span>Pts</span><span>Forme</span></div>`;
      tbl.slice(0,max).forEach((t,i)=>{
        const cls=i<lg.chl?'chl':i<(lg.chl+lg.eur)?'eur':'';
        const form=(t.form||'').split(',').filter(Boolean).slice(-5)
          .map(r=>`<div class="fp" style="background:${r==='W'?'#34d399':r==='D'?'#38bdf8':'#f87171'}"></div>`).join('');
        h+=`<div class="str ${cls}">
          <span class="sp">${t.position}</span>
          <div class="st">${crest(t.team?.crest||'',20,'scr')}<span class="sn">${t.team?.shortName||t.team?.name||'?'}</span></div>
          <span class="ss">${t.playedGames}</span><span class="ss">${t.won}</span>
          <span class="ss">${t.draw}</span><span class="ss">${t.lost}</span>
          <span class="spt">${t.points}</span>
          <div class="fr">${form}</div>
        </div>`;
      });
      h+='</div>';
      p.innerHTML=h;
      await new Promise(r=>setTimeout(r,180));
    } catch(e) { h+=`<div class="err" style="margin-bottom:8px">${lg.name} : ${e.message}</div>`; p.innerHTML=h; }
  }
  standLoaded=true;
}

function goTab(i) {
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',i===j));
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('on',i===j));
  if (i===1 && !calLoaded) loadCal();
  if (i===2 && !standLoaded) loadStand();
}

function updateClk() {
  const n=new Date();
  document.getElementById('clk').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

function updateUpd() {
  const n=new Date();
  document.getElementById('upd').innerHTML=`<span class="upd-live">↻</span> MàJ ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

async function manualRefresh() {
  const btn=document.getElementById('rbtn');
  btn.classList.add('spin');
  const activeIdx=[...document.querySelectorAll('.page')].findIndex(p=>p.classList.contains('on'));
  if (activeIdx===0) await loadLive(false);
  if (activeIdx===1) { calLoaded=false; await loadCal(); }
  if (activeIdx===2) { standLoaded=false; await loadStand(); }
  updateUpd();
  setTimeout(()=>btn.classList.remove('spin'),500);
}

// ── BOUCLE PRINCIPALE : live toutes les 20 secondes ──
async function startLiveLoop() {
  await loadLive(false);
  updateUpd();
  liveInterval = setInterval(async () => {
    await loadLive(true);
    updateUpd();
  }, 20000);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
updateClk();
setInterval(updateClk, 15000);
startLiveLoop();
</script>
