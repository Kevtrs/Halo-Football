<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Veher Live">
<meta name="theme-color" content="#050810">
<title>Veher Live v1.6</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--bg2:#080d18;--bg3:#0d1428;--om:#009BDE;--om2:#38bdf8;--white:#f0f6ff;--dim:#7a9fc0;--muted:#243650;--b1:rgba(0,155,222,0.1);--b2:rgba(0,155,222,0.25);--f:'Outfit',sans-serif;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--f);min-height:100dvh;overflow-x:hidden}
.hdr{padding:calc(var(--sat) + 18px) 20px 0;background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:36px;height:36px;border-radius:10px;background:var(--om);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;box-shadow:0 0 16px rgba(0,155,222,.5);flex-shrink:0}
.logo-text{font-size:21px;font-weight:800;color:var(--white);letter-spacing:-.3px}.logo-text span{color:var(--om)}
.hdr-r{display:flex;align-items:center;gap:10px}
.clk{font-size:13px;color:var(--muted);font-weight:600}
.rbtn{background:var(--bg3);border:1px solid var(--b2);color:var(--om);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.rbtn.spin{animation:spinr .6s linear}
@keyframes spinr{to{transform:rotate(360deg)}}
.tabs-wrap{display:flex;gap:8px;padding:0 0 14px;overflow-x:auto;scrollbar-width:none}.tabs-wrap::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;color:var(--dim);background:var(--bg2);border:1px solid var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
.tab.on{background:var(--om);color:#fff;border-color:var(--om);box-shadow:0 0 16px rgba(0,155,222,.35)}
.tab-live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.3s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:4px 16px calc(var(--sab) + 28px)}
.page{display:none}.page.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.sr{width:26px;height:26px;border:2.5px solid var(--bg3);border-top-color:var(--om);border-radius:50%;animation:spinr .7s linear infinite;margin:0 auto 14px}
.sec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.8px;padding:14px 2px 8px;text-transform:uppercase}.sec b{color:var(--om2)}
.mc{background:var(--bg2);border:1px solid var(--b1);border-radius:18px;padding:14px 15px;margin-bottom:10px}
.mc.live{border-color:var(--b2);background:linear-gradient(150deg,#060c1e 0%,#080d18 100%)}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px}
.mc-comp{font-size:11px;color:var(--dim);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:9px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.b-live{background:rgba(0,155,222,.18);color:var(--om);border:1px solid rgba(0,155,222,.35)}
.b-ht{background:rgba(56,189,248,.12);color:var(--om2);border:1px solid rgba(56,189,248,.25)}
.b-ft{background:rgba(36,54,80,.4);color:var(--muted);border:1px solid var(--muted)}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.th{display:flex;align-items:center;gap:9px}.ta{display:flex;align-items:center;gap:9px;flex-direction:row-reverse}
.cr{width:32px;height:32px;object-fit:contain}.cr-e{width:32px;height:32px;background:var(--bg3);border-radius:50%}
.tn{font-size:14px;font-weight:800;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scb{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--bg3);border-radius:14px;border:1px solid var(--b2)}
.scn{font-size:28px;font-weight:900;line-height:1}.scs{font-size:15px;color:var(--muted)}
.sct{font-size:19px;font-weight:800;color:var(--om2);padding:5px 12px;background:rgba(56,189,248,.07);border-radius:12px;border:1px solid rgba(56,189,248,.15)}
.mc-min{text-align:center;font-size:12px;color:var(--om);margin-top:10px;font-weight:700}
.scorers{margin-top:12px;background:rgba(0,155,222,.06);border-radius:12px;border:1px solid rgba(0,155,222,.15);overflow:hidden}
.scorers-hdr{padding:8px 12px 6px;font-size:9px;font-weight:800;color:var(--om);letter-spacing:1.8px;text-transform:uppercase;border-bottom:1px solid rgba(0,155,222,.1)}
.scorers-grid{display:grid;grid-template-columns:1fr 1fr}
.goal-left,.goal-right{padding:6px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.goal-left{justify-content:flex-start}.goal-right{justify-content:flex-end}
.gmin{color:var(--om);font-weight:700;font-size:11px}
.cal-card{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.cal-t{font-size:17px;font-weight:800;color:var(--om);min-width:46px}
.cal-i{flex:1;min-width:0}.cal-tn{font-size:13px;font-weight:700;margin-bottom:3px}
.day-sep{font-size:11px;color:var(--om2);font-weight:700;padding:14px 2px 6px;border-top:1px solid var(--bg3);margin-top:4px}
.det-btn{background:var(--bg3);border:1px solid var(--b2);color:var(--om);padding:6px 14px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
.det-panel{display:none;margin-top:10px;border-top:1px solid var(--bg3);padding-top:10px;animation:fi .2s ease}
.det-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px;color:var(--dim)}
.ftr{padding:8px 20px 6px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted);border-top:1px solid var(--bg3)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo"><div class="logo-mark" id="logoMark">VL</div><div class="logo-text">Veher <span>Live</span></div></div>
    <div class="hdr-r"><span class="clk" id="clk">--:--</span><div class="rbtn" id="rbtn" onclick="manualRefresh()">↻</div></div>
  </div>
  <div class="tabs-wrap">
    <div class="tab on" id="t0" onclick="goTab(0)"><div class="tab-live-dot" id="liveDot" style="display:none"></div><span>⚽</span>Live</div>
    <div class="tab" id="t1" onclick="goTab(1)"><span>📅</span>Calendrier</div>
    <div class="tab" id="t2" onclick="goTab(2)"><span>🏁</span>Résultats</div>
    <div class="tab" id="t3" onclick="goTab(3)"><span>🔵</span>OM</div>
  </div>
</div>
<div class="content">
  <div class="page on" id="p0"><div class="loading"><div class="sr"></div>Chargement...</div></div>
  <div class="page" id="p1"></div>
  <div class="page" id="p2"></div>
  <div class="page" id="p3"></div>
</div>
<div class="ftr"><span id="upd">Connexion...</span><span>● connecté</span></div>

<script>
const BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer';
const LEAGUES = [
  { slug: 'fra.1', name: 'Ligue 1' },
  { slug: 'uefa.champions', name: 'Champions League' },
  { slug: 'eng.1', name: 'Premier League' },
  { slug: 'esp.1', name: 'LaLiga' },
  { slug: 'ita.1', name: 'Serie A' },
  { slug: 'ger.1', name: 'Bundesliga' }
];
let calLoaded = false, standLoaded = false, liveEvents = [], finishedTodayEvents = [];

async function espn(slug, params = '') { const r = await fetch(`${BASE}/${slug}/scoreboard${params}`); return r.json(); }
async function espnSummary(slug, eventId) { const r = await fetch(`${BASE}/${slug}/summary?event=${eventId}`); return r.json(); }

// --- PARSING SECURISE ---
function getTextLower(d) { return String(d?.text || d?.shortText || d?.type?.text || '').toLowerCase(); }
function getPlayerName(d) {
  if (!d) return '';
  if (d.athletesInvolved?.[0]) return d.athletesInvolved[0].displayName || d.athletesInvolved[0].fullName || '';
  if (d.athlete) return d.athlete.displayName || d.athlete.fullName || '';
  return '';
}

function scorerBlock(details, homeId, awayId) {
  const goals = (details || []).filter(d => { const t = getTextLower(d); return !!d?.scoringPlay || t.includes('goal') || t.includes('but'); });
  if (!goals.length) return '';
  const rows = goals.map(g => {
    const name = getPlayerName(g), min = g?.clock?.displayValue || '', tid = g?.team?.id ? String(g.team.id) : '';
    const isHome = tid && String(homeId) === tid;
    const isAway = tid && String(awayId) === tid;
    const content = `<span class="gname">${name}</span><span>⚽</span><span class="gmin">${min}</span>`;
    return isHome ? `<div class="goal-left">${content}</div><div class="goal-right"></div>` : `<div class="goal-left"></div><div class="goal-right">${content}</div>`;
  }).join('');
  return `<div class="scorers"><div class="scorers-hdr">Buteurs</div><div class="scorers-grid">${rows}</div></div>`;
}

// --- CHARGEMENT AU CLIC ---
async function toggleDetails(eventId, leagueSlug, btn) {
  const panel = document.getElementById('det-' + eventId);
  if (!panel) return;
  if (panel.style.display === 'block') { panel.style.display = 'none'; btn.textContent = 'Détails'; return; }
  
  if (panel.innerHTML === '') {
    panel.innerHTML = '<div class="sr" style="width:16px;height:16px;margin:10px auto"></div>';
    panel.style.display = 'block';
    btn.textContent = 'Fermer';
    try {
      const s = await espnSummary(leagueSlug || 'all', eventId);
      const events = s?.header?.competitions?.[0]?.details || [];
      const homeId = s?.header?.competitions?.[0]?.competitors?.find(c => c.homeAway === 'home')?.id;
      
      if (!events.length) { panel.innerHTML = '<div style="text-align:center;font-size:11px;color:var(--muted)">Indisponible</div>'; return; }
      
      let html = '';
      events.forEach(e => {
        const type = getTextLower(e);
        const icon = type.includes('goal') ? '⚽' : (type.includes('red') ? '🟥' : (type.includes('yellow') ? '🟨' : '•'));
        const isAway = e.team?.id && String(e.team.id) !== String(homeId);
        html += `<div class="det-row" style="justify-content:${isAway?'flex-end':'flex-start'}">
          ${isAway?'':icon} <span>${getPlayerName(e)} <small>${e.clock?.displayValue||''}</small></span> ${isAway?icon:''}
        </div>`;
      });
      panel.innerHTML = html;
    } catch(e) { panel.innerHTML = 'Erreur'; }
  } else { panel.style.display = 'block'; btn.textContent = 'Fermer'; }
}

// --- LOGIQUE CORE ---
function isLive(ev) { return ev?.status?.type?.state === 'in' || ev?.status?.type?.shortDetail === 'HT'; }
function isDone(ev) { return ev?.status?.type?.state === 'post'; }
function lt(u) { return new Date(u).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }); }
function dl(u) { return new Date(u).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' }); }
function dateKey(d) { return d.toISOString().split('T')[0].replace(/-/g, ''); }

function normalize(ev, lName, lSlug) {
  const c = ev.competitions[0], h = c.competitors.find(x => x.homeAway === 'home'), a = c.competitors.find(x => x.homeAway === 'away');
  return { id:ev.id, leagueName:lName, leagueSlug:lSlug, date:ev.date, homeName:h.team.shortDisplayName, awayName:a.team.shortDisplayName, homeLogo:h.team.logo, awayLogo:a.team.logo, homeScore:h.score, awayScore:a.score, status:c.status, homeTeamId:h.team.id, awayTeamId:a.team.id, details:c.details || [] };
}

function renderMatch(m) {
  const live = isLive(m), done = isDone(m);
  const score = (live || done) ? `<div class="scb"><span class="scn">${m.homeScore}</span><span class="scs">-</span><span class="scn">${m.awayScore}</span></div>` : `<div class="sct">${lt(m.date)}</div>`;
  const badge = live ? `<span class="badge b-live">${m.status.type.shortDetail}</span>` : (done ? '<span class="badge b-ft">Terminé</span>' : '');
  
  return `<div class="mc ${live?'live':''}">
    <div class="mc-top"><span class="mc-comp">${m.leagueName}</span>${badge}</div>
    <div class="teams">
      <div class="th"><img src="${m.homeLogo}" class="cr"><span class="tn">${m.homeName}</span></div>
      ${score}
      <div class="ta"><span class="tn">${m.awayName}</span><img src="${m.awayLogo}" class="cr"></div>
    </div>
    ${live ? `<div class="mc-min">${m.status.type.shortDetail}</div>${scorerBlock(m.details, m.homeTeamId, m.awayTeamId)}` : ''}
    ${done ? `<button class="det-btn" onclick="toggleDetails('${m.id}', '${m.leagueSlug}', this)">Détails</button><div id="det-${m.id}" class="det-panel"></div>` : ''}
  </div>`;
}

async function loadLive(silent = false) {
  const p = document.getElementById('p0'); if(!silent) p.innerHTML = '<div class="loading"><div class="sr"></div>Chargement...</div>';
  try {
    const results = await Promise.allSettled(LEAGUES.map(lg => espn(lg.slug).then(d => ({lg, d}))));
    let matches = [];
    results.forEach(r => { if(r.status==='fulfilled') r.value.d.events?.forEach(ev => matches.push(normalize(ev, r.value.lg.name, r.value.lg.slug))); });
    liveEvents = matches.filter(isLive);
    finishedTodayEvents = matches.filter(isDone);
    document.getElementById('liveDot').style.display = liveEvents.length ? 'block' : 'none';
    p.innerHTML = liveEvents.length ? `<div class="sec">Direct <b>${liveEvents.length}</b></div>` + liveEvents.map(m => renderMatch(m)).join('') : '<div class="empty">Aucun live en cours</div>';
  } catch(e) { p.innerHTML = 'Erreur'; }
}

async function loadCal() {
  const p = document.getElementById('p1'); p.innerHTML = '<div class="loading"><div class="sr"></div>Calendrier...</div>';
  try {
    const start = new Date(), end = new Date(); end.setDate(end.getDate() + 14);
    const range = `?dates=${dateKey(start)}-${dateKey(end)}`;
    const results = await Promise.allSettled(LEAGUES.map(lg => espn(lg.slug, range).then(d => ({lg, d}))));
    let matches = [];
    results.forEach(r => { if(r.status==='fulfilled') r.value.d.events?.forEach(ev => { if(ev.status.type.state==='pre') matches.push(normalize(ev, r.value.lg.name, r.value.lg.slug)); }); });
    matches.sort((a,b) => new Date(a.date) - new Date(b.date));
    const byDay = {}; matches.forEach(m => { const d = dl(m.date); if(!byDay[d]) byDay[d] = []; byDay[d].push(m); });
    p.innerHTML = Object.entries(byDay).map(([day, ms]) => `<div class="day-sep">${day}</div>` + ms.map(m => `<div class="cal-card"><div class="cal-t">${lt(m.date)}</div><div class="cal-i"><div class="cal-tn">${m.homeName} - ${m.awayName}</div><div class="cal-cn">${m.leagueName}</div></div></div>`).join('')).join('');
    calLoaded = true;
  } catch(e) { p.innerHTML = 'Erreur'; }
}

async function loadOM() {
  const p = document.getElementById('p3'); p.innerHTML = '<div class="loading"><div class="sr"></div>Chargement OM...</div>';
  try {
    const d = await espn('fra.1');
    const matches = (d.events || []).filter(ev => {
      const h = ev.competitions[0].competitors[0].team.displayName.toLowerCase(), a = ev.competitions[0].competitors[1].team.displayName.toLowerCase();
      return h.includes('marseille') || a.includes('marseille') || h === 'om' || a === 'om';
    }).map(ev => normalize(ev, 'Ligue 1', 'fra.1'));
    p.innerHTML = `<div class="sec">Olympique de Marseille</div>` + matches.map(m => renderMatch(m)).join('');
    standLoaded = true;
  } catch(e) { p.innerHTML = 'Erreur'; }
}

function goTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('on', i===j));
  document.querySelectorAll('.page').forEach((p,j) => p.classList.toggle('on', i===j));
  if(i===1 && !calLoaded) loadCal();
  if(i===2) document.getElementById('p2').innerHTML = `<div class="sec">Résultats récents</div>` + finishedTodayEvents.map(m => renderMatch(m)).join('');
  if(i===3 && !standLoaded) loadOM();
}

function updateUpd() { const n = new Date(); document.getElementById('upd').textContent = `MàJ ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`; }
async function manualRefresh() { const b = document.getElementById('rbtn'); b.classList.add('spin'); await loadLive(); updateUpd(); setTimeout(()=>b.classList.remove('spin'), 500); }

setInterval(() => { const n = new Date(); document.getElementById('clk').textContent = `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`; }, 1000);
loadLive(); updateUpd();
setInterval(() => { loadLive(true); updateUpd(); }, 30000);
</script>
</body>
</html>
