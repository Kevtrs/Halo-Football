<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Veher Live</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--bg2:#080d18;--bg3:#0d1428;--om:#009BDE;--om2:#38bdf8;--white:#f0f6ff;--dim:#7a9fc0;--muted:#243650;--b1:rgba(0,155,222,0.1);--b2:rgba(0,155,222,0.25);--f:'Outfit',sans-serif;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--f);min-height:100dvh;overflow-x:hidden}
.hdr{padding:calc(var(--sat) + 18px) 20px 0;background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:36px;height:36px;border-radius:10px;background:var(--om);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;box-shadow:0 0 16px rgba(0,155,222,.5);flex-shrink:0;letter-spacing:-.5px}
.logo-text{font-size:21px;font-weight:800;color:var(--white);letter-spacing:-.3px}.logo-text span{color:var(--om)}
.hdr-r{display:flex;align-items:center;gap:10px}
.clk{font-size:13px;color:var(--muted);font-weight:600}
.rbtn{background:var(--bg3);border:1px solid var(--b2);color:var(--om);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:.15s}
.rbtn.spin{animation:spinr .6s linear}
@keyframes spinr{to{transform:rotate(360deg)}}
.tabs-wrap{display:flex;gap:8px;padding:0 0 14px;overflow-x:auto;scrollbar-width:none}
.tab{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;color:var(--dim);background:var(--bg2);border:1px solid var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.on{background:var(--om);color:#fff;border-color:var(--om);box-shadow:0 0 16px rgba(0,155,222,.35)}
.tab-live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:4px 16px calc(var(--sab) + 28px)}
.page{display:none}.page.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.sr{width:26px;height:26px;border:2.5px solid var(--bg3);border-top-color:var(--om);border-radius:50%;animation:spinr .7s linear infinite;margin:0 auto 14px}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;line-height:2}.empty-icon{font-size:32px;display:block;margin-bottom:10px}
.sec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.8px;padding:14px 2px 8px;text-transform:uppercase}.sec b{color:var(--om2)}
.mc{background:var(--bg2);border:1px solid var(--b1);border-radius:18px;padding:14px 15px;margin-bottom:10px}
.mc.live{border-color:var(--b2);background:linear-gradient(150deg,#060c1e 0%,#080d18 100%)}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px}
.mc-comp{font-size:11px;color:var(--dim);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
.badge{font-size:9px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.b-live{background:rgba(0,155,222,0.18);color:var(--om);border:1px solid rgba(0,155,222,0.35);animation:blink 1.4s infinite}
.b-ft{background:rgba(36,54,80,0.4);color:var(--muted);border:1px solid var(--muted)}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.th{display:flex;align-items:center;gap:9px}.ta{display:flex;align-items:center;gap:9px;flex-direction:row-reverse}
.cr{width:32px;height:32px;object-fit:contain}
.tn{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}
.scb{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--bg3);border-radius:14px;border:1px solid var(--b2)}
.scn{font-size:28px;font-weight:900;color:var(--white);line-height:1}.scs{font-size:15px;color:var(--muted)}
.sct{font-size:19px;font-weight:800;color:var(--om2);padding:5px 12px;background:rgba(56,189,248,0.07);border-radius:12px;border:1px solid rgba(56,189,248,0.15)}
.mc-min{text-align:center;font-size:12px;color:var(--om);margin-top:10px;font-weight:700}
.ftr{padding:8px 20px 6px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted);border-top:1px solid var(--bg3);font-weight:600}
.cal-card{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.cal-t{font-size:17px;font-weight:800;color:var(--om);min-width:46px}
.day-sep{font-size:11px;color:var(--om2);font-weight:700;padding:14px 2px 6px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo"><div class="logo-mark">VL</div><div class="logo-text">Veher <span>Live</span></div></div>
    <div class="hdr-r"><span class="clk" id="clk">--:--</span><div class="rbtn" id="rbtn" onclick="manualRefresh()">↻</div></div>
  </div>
  <div class="tabs-wrap">
    <div class="tab on" id="t0" onclick="goTab(0)"><div class="tab-live-dot" id="liveDot" style="display:none"></div><span>⚽</span>En direct</div>
    <div class="tab" id="t1" onclick="goTab(1)"><span>📅</span>Calendrier</div>
    <div class="tab" id="t2" onclick="goTab(2)"><span>🏁</span>Résultats</div>
    <div class="tab" id="t3" onclick="goTab(3)"><span>🔵</span>OM</div>
  </div>
</div>
<div class="content">
  <div class="page on" id="p0"><div class="loading"><div class="sr"></div>Initialisation...</div></div>
  <div class="page" id="p1"><div class="loading">Chargement...</div></div>
  <div class="page" id="p2"><div class="loading">Chargement...</div></div>
  <div class="page" id="p3"><div class="loading">Chargement...</div></div>
</div>
<div class="ftr"><span id="upd">Connexion...</span><span style="color:var(--om)">● en ligne</span></div>

<script>
const BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer';
const FAVORITES = ['fra.1', 'uefa.champions'];
let allMatchesGlobal = [];

async function api(path) {
    const r = await fetch(`${BASE}/${path}`, { signal: AbortSignal.timeout(8000) });
    return r.json();
}

function normalize(ev, leagueName) {
    const comp = ev.competitions?.[0] || {};
    const teams = comp.competitors || [];
    const home = teams.find(t => t.homeAway === 'home') || teams[0];
    const away = teams.find(t => t.homeAway === 'away') || teams[1];
    return {
        id: ev.id,
        league: leagueName,
        homeName: home.team.shortDisplayName || home.team.name,
        awayName: away.team.shortDisplayName || away.team.name,
        homeLogo: home.team.logo,
        awayLogo: away.team.logo,
        homeScore: home.score,
        awayScore: away.score,
        status: ev.status,
        date: ev.date
    };
}

function renderMatch(m) {
    const isLive = m.status.type.state === 'in';
    const scoreHtml = m.homeScore != null ? `<div class="scb"><span class="scn">${m.homeScore}</span><span class="scs">–</span><span class="scn">${m.awayScore}</span></div>` : `<div class="sct">${new Date(m.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
    return `
    <div class="mc ${isLive ? 'live' : ''}">
        <div class="mc-top"><span class="mc-comp">${m.league}</span>${isLive ? '<span class="badge b-live">● LIVE</span>' : m.status.type.state === 'post' ? '<span class="badge b-ft">Terminé</span>' : ''}</div>
        <div class="teams">
            <div class="th"><img src="${m.homeLogo}" class="cr"><span class="tn">${m.homeName}</span></div>
            ${scoreHtml}
            <div class="ta"><span class="tn">${m.awayName}</span><img src="${m.awayLogo}" class="cr"></div>
        </div>
        ${isLive ? `<div class="mc-min">${m.status.type.shortDetail}</div>` : ''}
    </div>`;
}

async function loadLive(silent = false) {
    const p = document.getElementById('p0');
    if(!silent) p.innerHTML = '<div class="loading"><div class="sr"></div>Scan en cours...</div>';
    
    try {
        let results = [];
        // Favoris
        for(const slug of FAVORITES) {
            try {
                const data = await api(`${slug}/scoreboard`);
                const name = data.leagues?.[0]?.name || 'Ligue';
                data.events?.forEach(ev => results.push(normalize(ev, name)));
            } catch(e) {}
        }

        // Si rien en direct, on scanne TOUT le monde
        if (!results.some(m => m.status.type.state === 'in')) {
            const world = await api(`all/scoreboard`);
            world.events?.forEach(ev => {
                if(ev.status.type.state === 'in') results.push(normalize(ev, ev.competitions?.[0]?.league?.name || 'Monde'));
            });
        }

        allMatchesGlobal = results;
        const live = results.filter(m => m.status.type.state === 'in');
        document.getElementById('liveDot').style.display = live.length ? 'block' : 'none';

        if(live.length > 0) {
            let h = '<div class="sec">En direct · <b>Monde</b></div>';
            live.forEach(m => h += renderMatch(m));
            p.innerHTML = h;
        } else {
            p.innerHTML = '<div class="empty"><span class="empty-icon">⚽</span>Aucun direct pour le moment</div>';
        }
    } catch(e) {
        p.innerHTML = '<div class="empty">Erreur de connexion</div>';
    }
}

async function loadCal() {
    const p = document.getElementById('p1');
    p.innerHTML = '<div class="loading">Recherche des matchs...</div>';
    let h = '';
    for(const slug of FAVORITES) {
        try {
            const data = await api(`${slug}/scoreboard`);
            const name = data.leagues?.[0]?.name || '';
            h += `<div class="day-sep">${name}</div>`;
            data.events?.filter(ev => ev.status.type.state === 'pre').forEach(ev => {
                const m = normalize(ev, name);
                h += `<div class="cal-card"><div class="cal-t">${new Date(m.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div><div><div style="font-weight:700">${m.homeName} - ${m.awayName}</div><div style="font-size:11px;color:var(--dim)">${new Date(m.date).toLocaleDateString()}</div></div></div>`;
            });
        } catch(e) {}
    }
    p.innerHTML = h || '<div class="empty">Aucun match prévu</div>';
}

function goTab(i) {
    document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('on', i===j));
    document.querySelectorAll('.page').forEach((p,j) => p.classList.toggle('on', i===j));
    if(i === 0) loadLive();
    if(i === 1) loadCal();
    if(i === 2) {
        const finished = allMatchesGlobal.filter(m => m.status.type.state === 'post');
        document.getElementById('p2').innerHTML = finished.length ? finished.map(renderMatch).join('') : '<div class="empty">Aucun résultat aujourd\'hui</div>';
    }
}

function updateUpd() {
    const n = new Date();
    const time = `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
    document.getElementById('upd').innerHTML = `<span style="color:var(--om2)">↻</span> MàJ ${time}`;
    document.getElementById('clk').textContent = time;
}

async function manualRefresh() {
    const btn = document.getElementById('rbtn');
    btn.classList.add('spin');
    await loadLive();
    updateUpd();
    setTimeout(() => btn.classList.remove('spin'), 600);
}

// Start
loadLive();
updateUpd();
setInterval(() => { loadLive(true); updateUpd(); }, 30000);
</script>
</body>
</html>
