<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Veher Live</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;--bg2:#080d18;--bg3:#0d1428;--bg4:#111e38;--om:#009BDE;--om2:#38bdf8;--white:#f0f6ff;--dim:#7a9fc0;--muted:#243650;--deep:#060e1a;--green:#34d399;--red:#f87171;--b1:rgba(0,155,222,0.1);--b2:rgba(0,155,222,0.25);--f:'Outfit',sans-serif;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--f);min-height:100dvh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
.hdr{padding:calc(var(--sat) + 18px) 20px 0;background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:11px}.logo-mark{width:36px;height:36px;border-radius:10px;background:var(--om);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;box-shadow:0 0 16px rgba(0,155,222,.5);flex-shrink:0;letter-spacing:-.5px}.logo-text{font-size:21px;font-weight:800;color:var(--white);letter-spacing:-.3px}.logo-text span{color:var(--om)}.hdr-r{display:flex;align-items:center;gap:10px}.clk{font-size:13px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}.rbtn{background:var(--bg3);border:1px solid var(--b2);color:var(--om);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;user-select:none;transition:.15s}.rbtn:active{transform:scale(.88)}.rbtn.spin{animation:spinr .6s linear}@keyframes spinr{to{transform:rotate(360deg)}}
.tabs-wrap{display:flex;gap:8px;padding:0 0 14px;overflow-x:auto;scrollbar-width:none}.tabs-wrap::-webkit-scrollbar{display:none}.tab{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;color:var(--dim);background:var(--bg2);border:1px solid var(--muted);cursor:pointer;user-select:none;transition:all .2s;white-space:nowrap;flex-shrink:0}.tab:hover{border-color:var(--om);color:var(--white)}.tab.on{background:var(--om);color:#fff;border-color:var(--om);box-shadow:0 0 16px rgba(0,155,222,.35)}.tab-icon{font-size:14px;line-height:1}.tab-live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.3s infinite;flex-shrink:0}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:4px 16px calc(var(--sab) + 28px)}.page{display:none}.page.on{display:block;animation:fi .2s ease}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;font-weight:500}.sr{width:26px;height:26px;border:2.5px solid var(--bg3);border-top-color:var(--om);border-radius:50%;animation:spinr .7s linear infinite;margin:0 auto 14px}
.sec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.8px;padding:14px 2px 8px;text-transform:uppercase}.sec:first-child{padding-top:4px}.sec b{color:var(--om2)}
.mc{background:var(--bg2);border:1px solid var(--b1);border-radius:18px;padding:14px 15px;margin-bottom:10px}.mc.live{border-color:var(--b2);background:linear-gradient(150deg,#060c1e 0%,#080d18 100%);box-shadow:0 2px 24px rgba(0,155,222,.08)}.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px}.mc-comp{font-size:11px;color:var(--dim);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}.badge{font-size:9px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}.b-live{background:rgba(0,155,222,.18);color:var(--om);border:1px solid rgba(0,155,222,.35);animation:blink 1.4s infinite}.b-ht{background:rgba(56,189,248,.12);color:var(--om2);border:1px solid rgba(56,189,248,.25)}.b-ft{background:rgba(36,54,80,.4);color:var(--muted);border:1px solid var(--muted)}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}.th{display:flex;align-items:center;gap:9px}.ta{display:flex;align-items:center;gap:9px;flex-direction:row-reverse}.cr{width:32px;height:32px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 5px rgba(0,0,0,.7))}.cr-e{width:32px;height:32px;background:var(--bg3);border-radius:50%;flex-shrink:0;border:1px solid var(--b2)}.tn{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}.th .tn{text-align:left}.ta .tn{text-align:right}
.scb{display:flex;align-items:center;gap:5px;flex-shrink:0;padding:5px 12px;background:var(--bg3);border-radius:14px;border:1px solid var(--b2)}.scn{font-size:28px;font-weight:900;color:var(--white);min-width:20px;text-align:center;line-height:1}.scs{font-size:15px;color:var(--muted);font-weight:400}.sct{font-size:19px;font-weight:800;color:var(--om2);text-align:center;white-space:nowrap;padding:5px 12px;background:rgba(56,189,248,.07);border-radius:12px;border:1px solid rgba(56,189,248,.15)}
.mc-min{text-align:center;font-size:12px;color:var(--om);margin-top:10px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:6px}.mc-min::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--om);flex-shrink:0;box-shadow:0 0 7px var(--om);animation:blink 1.2s infinite}
.scorers{margin-top:12px;background:rgba(0,155,222,.06);border-radius:12px;border:1px solid rgba(0,155,222,.15);overflow:hidden}.scorers-hdr{padding:8px 12px 6px;font-size:9px;font-weight:800;color:var(--om);letter-spacing:1.8px;text-transform:uppercase;border-bottom:1px solid rgba(0,155,222,.1)}.goal-line{display:flex;align-items:center;gap:9px;padding:7px 12px;border-top:1px solid rgba(0,155,222,.06);font-size:13px}.goal-line:first-of-type{border-top:none}.goal-ball{font-size:14px;flex-shrink:0}.goal-name{color:var(--white);font-weight:700}.goal-min{color:var(--om);font-weight:700;font-size:12px;margin-left:3px}.goal-team{color:var(--dim);font-size:11px;margin-left:2px}
.bookings{margin-top:8px;display:flex;flex-direction:column;gap:4px;padding:0 2px}.bk-line{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);font-weight:500}
.cal-card{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}.cal-t{font-size:17px;font-weight:800;color:var(--om);min-width:46px;flex-shrink:0}.cal-cc{display:flex;align-items:center;gap:4px;flex-shrink:0}.ccr{width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}.ccr-e{width:24px;height:24px;background:var(--bg3);border-radius:50%;border:1px solid var(--b2)}.cal-i{flex:1;min-width:0}.cal-tn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;color:var(--white)}.cal-cn{font-size:11px;color:var(--dim);font-weight:500}.day-sep{font-size:11px;color:var(--om2);font-weight:700;letter-spacing:.5px;padding:14px 2px 6px;border-top:1px solid var(--bg3);margin-top:4px}.day-sep:first-child{border-top:none;margin-top:0;padding-top:2px}
.lhdr{font-size:14px;font-weight:800;color:var(--white);padding:18px 2px 8px;display:flex;align-items:center;gap:10px}.lhdr:first-child{padding-top:4px}.lhdr::after{content:'';flex:1;height:1px;background:var(--bg3)}.lhdr span{color:var(--om)}.sb{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:16px}.sth{display:grid;grid-template-columns:20px 1fr 26px 26px 26px 26px 30px 44px;gap:2px;padding:8px 12px;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;border-bottom:1px solid var(--bg3);text-transform:uppercase}.str{display:grid;grid-template-columns:20px 1fr 26px 26px 26px 26px 30px 44px;gap:2px;padding:9px 12px;border-top:1px solid var(--bg3);align-items:center}.str:first-child{border-top:none}.str.chl{background:rgba(0,155,222,.05)}.sp{color:var(--muted);font-size:11px;text-align:center;font-weight:700}.st{display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden}.scr{width:20px;height:20px;object-fit:contain;flex-shrink:0}.scr-e{width:20px;height:20px;background:var(--bg3);border-radius:50%;flex-shrink:0}.sn{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}.ss{color:var(--muted);font-size:11px;text-align:center}.spt{font-size:14px;font-weight:900;color:var(--om);text-align:center}.fr{display:flex;gap:3px;justify-content:center}.fp{width:7px;height:7px;border-radius:50%}
.err{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:14px;padding:14px;font-size:13px;color:#fca5a5;margin:6px 0;line-height:1.7}.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;line-height:2;font-weight:500}.empty-icon{font-size:32px;display:block;margin-bottom:10px}
.ftr{padding:8px 20px 6px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted);border-top:1px solid var(--bg3);font-weight:600}.ok{color:var(--om)}.upd-live{color:var(--om2)}

@media(min-width:640px){
  .hdr{max-width:780px;margin:0 auto;padding-left:32px;padding-right:32px}
  .content{max-width:780px;margin:0 auto;padding-left:32px;padding-right:32px}
  .ftr{max-width:780px;margin:0 auto;padding-left:32px;padding-right:32px}
  .mc{border-radius:20px;padding:18px 20px}
  .scn{font-size:34px}
  .tn{font-size:16px}
  .cr{width:40px;height:40px}
  .cr-e{width:40px;height:40px}
  html,body{background:#020508}
  .hdr{background:#020508}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo"><div class="logo-mark" id="logoMark">VL</div><div class="logo-text">Veher <span>Live</span></div></div>
    <div class="hdr-r"><span class="clk" id="clk">--:--</span><div class="rbtn" id="rbtn" onclick="manualRefresh()">↻</div></div>
  </div>
  <div class="tabs-wrap">
    <div class="tab on" id="t0" onclick="goTab(0)"><div class="tab-live-dot" id="liveDot" style="display:none"></div><span class="tab-icon">⚽</span>En direct</div>
    <div class="tab" id="t1" onclick="goTab(1)"><span class="tab-icon">📅</span>Calendrier</div>
    <div class="tab" id="t2" onclick="goTab(2)"><span class="tab-icon">🏁</span>Résultats</div>
    <div class="tab" id="t3" onclick="goTab(3)"><span class="tab-icon">🏆</span>Classements</div>
  </div>
</div>
<div class="content">
  <div class="page on" id="p0"><div class="loading"><div class="sr"></div>Chargement des matchs...</div></div>
  <div class="page" id="p1"><div class="loading"><div class="sr"></div>Chargement du calendrier...</div></div>
  <div class="page" id="p2"><div class="loading"><div class="sr"></div>Chargement des résultats...</div></div>
  <div class="page" id="p3"><div class="loading"><div class="sr"></div>Chargement des classements...</div></div>
</div>
<div class="ftr"><span id="upd">Connexion...</span><span class="ok">● connecté</span></div>
<script>
const BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer';
const LEAGUES = [
  { slug:'fra.1',          name:'Ligue 1',          type:'league' },
  { slug:'eng.1',          name:'Premier League',   type:'league' },
  { slug:'esp.1',          name:'La Liga',          type:'league' },
  { slug:'ger.1',          name:'Bundesliga',       type:'league' },
  { slug:'ita.1',          name:'Serie A',          type:'league' },
  { slug:'uefa.champions', name:'Champions League', type:'cup'    },
  { slug:'uefa.europa',    name:'Europa League',    type:'cup'    },
  { slug:'fifa.world',     name:'Coupe du Monde',   type:'cup'    },
];
const KEY = '7585468b7f104d31a14311eafac3ba86';

let calLoaded = false;
let standLoaded = false;
let liveInterval = null;
let liveEvents = [];
let finishedTodayEvents = [];

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate() + n); return d; }
function dateKey(d) {
  const dt = new Date(d);
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2,'0');
  const day = String(dt.getDate()).padStart(2,'0');
  return `${y}${m}${day}`;
}
function dateRangeKey(from, to) { return `${dateKey(from)}-${dateKey(to)}`; }
function isSameLocalDay(a, b = new Date()) { return new Date(a).toDateString() === new Date(b).toDateString(); }

async function api(url) {
  const proxies = [
    'https://corsproxy.io/?' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url)
  ];
  let lastError = null;
  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy, { signal: AbortSignal.timeout(9000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch (e) {
      lastError = e;
    }
  }
  throw lastError || new Error('API inaccessible');
}

function crest(src, sz, cls) {
  if (!src) return `<div class="${cls}-e" style="width:${sz}px;height:${sz}px"></div>`;
  const safe = String(src).replace(/"/g,'&quot;');
  return `<img src="${safe}" class="${cls}" width="${sz}" height="${sz}" loading="lazy" onerror="this.outerHTML='<div class=&quot;${cls}-e&quot; style=&quot;width:${sz}px;height:${sz}px&quot;></div>'">`;
}

function badge(statusType) {
  const name = statusType?.name || '';
  const detail = statusType?.shortDetail || statusType?.detail || '';
  if (name.includes('STATUS_IN_PROGRESS') || name.includes('STATUS_END_PERIOD')) return '<span class="badge b-live">● LIVE</span>';
  if (detail === 'HT') return '<span class="badge b-ht">Mi-temps</span>';
  if (name.includes('STATUS_FINAL') || name.includes('STATUS_FULL_TIME')) return '<span class="badge b-ft">Terminé</span>';
  return '';
}

function isLiveEvent(event) {
  const name = event?.status?.type?.name || '';
  const state = event?.status?.type?.state || '';
  const detail = event?.status?.type?.shortDetail || '';
  return state === 'in' || name.includes('STATUS_IN_PROGRESS') || detail === 'HT';
}

function isFinishedEvent(event) {
  const state = event?.status?.type?.state || '';
  const name = event?.status?.type?.name || '';
  return state === 'post' || name.includes('STATUS_FINAL') || name.includes('STATUS_FULL_TIME');
}

function lt(u) {
  return new Date(u).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function dl(u) {
  const d=new Date(u),t=new Date(),tm=new Date();
  tm.setDate(tm.getDate()+1);
  if (d.toDateString()===t.toDateString()) return "Aujourd'hui";
  if (d.toDateString()===tm.toDateString()) return 'Demain';
  const s=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function getCompetitors(event) {
  const comp = event?.competitions?.[0];
  const list = comp?.competitors || [];
  const home = list.find(c => c.homeAway === 'home') || list[0] || {};
  const away = list.find(c => c.homeAway === 'away') || list[1] || {};
  return { home, away, comp };
}

function eventLeagueSlug(event, fallback='all') {
  return event?.leagues?.[0]?.slug || event?.league?.slug || fallback;
}

function eventLeagueName(event, fallback='Football') {
  return event?.leagues?.[0]?.name || event?.league?.name || event?.competitions?.[0]?.league?.name || fallback;
}

function eventUniqueKey(event, fallbackLeague='all') {
  return `${event?.id || 'noid'}::${eventLeagueSlug(event, fallbackLeague)}`;
}

function normalizeEvent(event, fallbackLeagueName, fallbackLeagueSlug='all') {
  const { home, away, comp } = getCompetitors(event);
  return {
    id: event.id,
    leagueSlug: eventLeagueSlug(event, fallbackLeagueSlug),
    leagueName: eventLeagueName(event, fallbackLeagueName),
    date: event.date,
    homeName: home.team?.shortDisplayName || home.team?.displayName || home.team?.name || '?',
    awayName: away.team?.shortDisplayName || away.team?.displayName || away.team?.name || '?',
    homeLogo: home.team?.logo || '',
    awayLogo: away.team?.logo || '',
    homeScore: home.score,
    awayScore: away.score,
    status: comp?.status || event.status || {},
    details: comp?.details || [],
    homeTeamId: home.team?.id,
    awayTeamId: away.team?.id,
  };
}

function scorerBlock(details, homeId, awayId) {
  const goals = (details || []).filter(d => d.scoringPlay);
  if (!goals.length) return '';
  const lines = goals.slice(-8).map(g => {
    const athlete = g.athletesInvolved?.[0];
    const name = athlete?.displayName || athlete?.fullName || '?';
    const minute = g.clock?.displayValue ? `<span class="goal-min">${g.clock.displayValue}</span>` : '';
    let team = '';
    if (g.team?.id && homeId && g.team.id === homeId) team = '<span class="goal-team">· domicile</span>';
    else if (g.team?.id && awayId && g.team.id === awayId) team = '<span class="goal-team">· extérieur</span>';
    return `<div class="goal-line"><span class="goal-ball">⚽</span><span><span class="goal-name">${name}</span>${minute}${team}</span></div>`;
  }).join('');
  return `<div class="scorers"><div class="scorers-hdr">Buteurs</div>${lines}</div>`;
}

function bookingsBlock(details) {
  const cards = (details || []).filter(d => d.yellowCard || d.redCard);
  if (!cards.length) return '';
  const lines = cards.slice(-6).map(c => {
    const athlete = c.athletesInvolved?.[0];
    const icon = c.redCard ? '🟥' : '🟨';
    const minute = c.clock?.displayValue || '';
    const name = athlete?.displayName || athlete?.fullName || '?';
    return `<div class="bk-line"><span>${icon}</span><span>${name}${minute ? ' ' + minute : ''}</span></div>`;
  }).join('');
  return `<div class="bookings">${lines}</div>`;
}

function renderMatch(m) {
  const showScore = m.homeScore != null && m.awayScore != null;
  const scoreHtml = showScore
    ? `<div class="scb"><span class="scn">${m.homeScore}</span><span class="scs">–</span><span class="scn">${m.awayScore}</span></div>`
    : `<div class="sct">${lt(m.date)}</div>`;

  const detail = m.status?.type?.shortDetail || m.status?.type?.detail || '';
  const minHtml = isLiveEvent({status:m.status}) ? `<div class="mc-min">${detail || 'En cours'}</div>` : '';

  return `<div class="mc${isLiveEvent({status:m.status}) ? ' live' : ''}">
    <div class="mc-top"><span class="mc-comp">${m.leagueName}</span>${badge(m.status?.type)}</div>
    <div class="teams">
      <div class="th">${crest(m.homeLogo,32,'cr')}<span class="tn">${m.homeName}</span></div>
      ${scoreHtml}
      <div class="ta"><span class="tn">${m.awayName}</span>${crest(m.awayLogo,32,'cr')}</div>
    </div>
    ${minHtml}
    ${scorerBlock(m.details, m.homeTeamId, m.awayTeamId)}
    ${bookingsBlock(m.details)}
  </div>`;
}

async function fetchLeagueScoreboard(leagueSlug, dateStr='') {
  const q = dateStr ? `?dates=${dateStr}` : '';
  return await api(`${BASE}/${leagueSlug}/scoreboard${q}`);
}

async function fetchAllScoreboard(dateStr='') {
  const q = dateStr ? `?dates=${dateStr}` : '';
  return await api(`${BASE}/all/scoreboard${q}`);
}

async function fetchSummarySafe(leagueSlug, eventId) {
  const tries = [
    `${BASE}/${leagueSlug}/summary?event=${eventId}`,
    `${BASE}/all/summary?event=${eventId}`,
  ];
  let lastErr = null;
  for (const url of tries) {
    try {
      return await api(url);
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('Summary inaccessible');
}

function dedupeMatches(matches) {
  const map = new Map();
  for (const m of matches) {
    const key = `${m.id}::${m.leagueSlug || ''}`;
    if (!map.has(key)) map.set(key, m);
    else {
      const prev = map.get(key);
      map.set(key, { ...prev, ...m, details: m.details?.length ? m.details : prev.details });
    }
  }
  return [...map.values()];
}

async function loadLive(silent=false) {
  const p = document.getElementById('p0');
  if (!silent) p.innerHTML = '<div class="loading"><div class="sr"></div>Chargement...</div>';
  try {
    const todayKey = dateKey(new Date());
    const sources = await Promise.allSettled([
      fetchAllScoreboard(todayKey).then(data => ({ source:'all', name:'Football', data })),
      ...LEAGUES.map(lg => fetchLeagueScoreboard(lg.slug, todayKey).then(data => ({ source:lg.slug, name:lg.name, data }))),
    ]);

    let matches = [];
    const seenEvents = new Set();

    for (const result of sources) {
      if (result.status !== 'fulfilled') continue;
      const { source, name, data } = result.value;
      for (const event of (data.events || [])) {
        const ukey = eventUniqueKey(event, source);
        if (seenEvents.has(ukey)) continue;
        seenEvents.add(ukey);
        if (!isLiveEvent(event) && !isFinishedEvent(event)) continue;
        if (isFinishedEvent(event) && !isSameLocalDay(event.date)) continue;
        matches.push(normalizeEvent(event, name, source));
      }
    }

    matches = dedupeMatches(matches);

    if (!matches.length) {
      liveEvents = [];
      finishedTodayEvents = [];
      p.innerHTML = `<div class="empty"><span class="empty-icon">⚽</span>Aucun match en cours pour le moment<br><small style="font-size:11px;opacity:.5">Consulte le calendrier pour les prochains matchs</small></div>`;
      document.getElementById('liveDot').style.display = 'none';
      if (document.getElementById('p2').classList.contains('on')) renderResults();
      return;
    }

    const needDetails = matches
      .filter(m => isLiveEvent({status:m.status}) || isFinishedEvent({status:m.status}))
      .slice(0, 24);

    const detailed = await Promise.allSettled(
      needDetails.map(m => fetchSummarySafe(m.leagueSlug || 'all', m.id))
    );

    detailed.forEach((r, i) => {
      if (r.status !== 'fulfilled') return;
      const summary = r.value;
      const event = summary.header || summary.event || {};
      const idx = matches.findIndex(m => m.id === needDetails[i].id);
      if (idx < 0) return;
      const { home, away } = getCompetitors(event);
      matches[idx] = {
        ...matches[idx],
        leagueSlug: eventLeagueSlug(event, matches[idx].leagueSlug || 'all'),
        leagueName: eventLeagueName(event, matches[idx].leagueName || 'Football'),
        homeScore: home.score ?? matches[idx].homeScore,
        awayScore: away.score ?? matches[idx].awayScore,
        status: event.status || matches[idx].status,
        details: summary.details || event.competitions?.[0]?.details || matches[idx].details || [],
        homeTeamId: home.team?.id || matches[idx].homeTeamId,
        awayTeamId: away.team?.id || matches[idx].awayTeamId,
      };
    });

    matches = dedupeMatches(matches).sort((a,b) => {
      const aLive = isLiveEvent({status:a.status}) ? 0 : 1;
      const bLive = isLiveEvent({status:b.status}) ? 0 : 1;
      return aLive - bLive || new Date(b.date) - new Date(a.date);
    });

    liveEvents = matches.filter(m => isLiveEvent({status:m.status}));
    finishedTodayEvents = matches
      .filter(m => isFinishedEvent({status:m.status}) && isSameLocalDay(m.date))
      .sort((a,b) => new Date(b.date) - new Date(a.date));

    document.getElementById('liveDot').style.display = liveEvents.length ? 'block' : 'none';

    let h = '';
    if (liveEvents.length) {
      h += `<div class="sec">En cours · <b>${liveEvents.length} match${liveEvents.length>1?'s':''}</b></div>`;
      liveEvents.forEach(m => h += renderMatch(m));
    } else {
      h = `<div class="empty"><span class="empty-icon">⚽</span>Aucun match en cours pour le moment<br><small style="font-size:11px;opacity:.5">Consulte le calendrier pour les prochains matchs</small></div>`;
    }
    p.innerHTML = h;

    if (document.getElementById('p2').classList.contains('on')) renderResults();
  } catch(e) {
    if (!silent) p.innerHTML = `<div class="err">Impossible de charger les matchs<br><small>${e.message || e}</small></div>`;
  }
}

async function loadCal() {
  const p = document.getElementById('p1');
  p.innerHTML = '<div class="loading"><div class="sr"></div>Chargement du calendrier...</div>';
  try {
    const range = dateRangeKey(new Date(), addDays(new Date(), 14));
    const sources = await Promise.allSettled([
      fetchAllScoreboard(range).then(data => ({ source:'all', name:'Football', data })),
      ...LEAGUES.map(lg => fetchLeagueScoreboard(lg.slug, range).then(data => ({ source:lg.slug, name:lg.name, data }))),
    ]);

    let matches = [];
    const seenEvents = new Set();

    for (const result of sources) {
      if (result.status !== 'fulfilled') continue;
      const { source, name, data } = result.value;
      for (const event of (data.events || [])) {
        const state = event?.status?.type?.state || '';
        if (state !== 'pre') continue;
        const key = eventUniqueKey(event, source);
        if (seenEvents.has(key)) continue;
        seenEvents.add(key);
        matches.push(normalizeEvent(event, name, source));
      }
    }

    matches = dedupeMatches(matches)
      .sort((a,b) => new Date(a.date) - new Date(b.date));

    if (!matches.length) {
      p.innerHTML = `<div class="empty"><span class="empty-icon">📅</span>Aucun match prévu prochainement</div>`;
      return;
    }

    const byDay = {};
    matches.forEach(m => {
      const key = dl(m.date);
      if (!byDay[key]) byDay[key] = [];
      byDay[key].push(m);
    });

    let h = '';
    Object.entries(byDay).forEach(([day, ms]) => {
      h += `<div class="day-sep">${day}</div>`;
      ms.forEach(m => {
        h += `<div class="cal-card">
          <div class="cal-t">${lt(m.date)}</div>
          <div class="cal-cc">${crest(m.homeLogo,24,'ccr')}${crest(m.awayLogo,24,'ccr')}</div>
          <div class="cal-i"><div class="cal-tn">${m.homeName} — ${m.awayName}</div><div class="cal-cn">${m.leagueName}</div></div>
        </div>`;
      });
    });

    p.innerHTML = h;
    calLoaded = true;
  } catch(e) {
    p.innerHTML = `<div class="err">Erreur calendrier<br><small>${e.message || e}</small></div>`;
  }
}

function renderResults() {
  const p = document.getElementById('p2');
  let h = '';
  if (!finishedTodayEvents.length) {
    p.innerHTML = `<div class="empty"><span class="empty-icon">📰</span>Aucun résultat aujourd'hui<br><small style="font-size:11px;opacity:.5">Les résultats apparaissent ici dès la fin des matchs</small></div>`;
    return;
  }
  h += `<div class="sec">Terminés aujourd'hui · <b>${finishedTodayEvents.length} match${finishedTodayEvents.length>1?'s':''}</b></div>`;
  finishedTodayEvents.forEach(m => h += renderMatch(m));
  p.innerHTML = h;
}

function loadResults() {
  renderResults();
}

async function loadStand() {
  const p = document.getElementById('p3');
  const FD_LEAGUES = [
    { id: 2015, name: 'Ligue 1',        chl: 3, eur: 2 },
    { id: 2021, name: 'Premier League', chl: 4, eur: 2 },
    { id: 2014, name: 'La Liga',        chl: 4, eur: 2 },
    { id: 2019, name: 'Serie A',        chl: 4, eur: 3 },
    { id: 2002, name: 'Bundesliga',     chl: 4, eur: 2 },
  ];

  async function apiFD(path, retries=2) {
    const target = 'https://api.football-data.org/v4' + path;
    const proxies = [
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(target),
      'https://corsproxy.io/?' + encodeURIComponent(target),
      'https://cors.isomorphic-git.org/' + target,
      'https://thingproxy.freeboard.io/fetch/' + target,
      'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(target),
    ];
    let lastErr = null;

    for (let attempt = 0; attempt <= retries; attempt++) {
      for (const proxy of proxies) {
        try {
          const r = await fetch(proxy, {
            headers: { 'X-Auth-Token': KEY },
            signal: AbortSignal.timeout(12000),
          });
          if (!r.ok) { lastErr = new Error('HTTP ' + r.status); }
          else {
            const data = await r.json();
            if (data) return data;
          }
        } catch(e) {
          lastErr = e;
        }
        await sleep(350);
      }
      if (attempt < retries) await sleep(1300 + attempt * 500);
    }
    throw lastErr || new Error('inaccessible');
  }

  let h = '<div class="legend"><div class="li"><div class="ld" style="background:rgba(0,155,222,.6)"></div>Ligue des champions</div><div class="li"><div class="ld" style="background:rgba(56,189,248,.5)"></div>Europa League</div></div>';
  p.innerHTML = h + '<div class="loading"><div class="sr"></div>Chargement...</div>';

  for (const lg of FD_LEAGUES) {
    try {
      const d = await apiFD('/competitions/' + lg.id + '/standings');
      const st = (d.standings || []).find(s => s.type === 'TOTAL') || d.standings?.[0];
      if (!st?.table?.length) {
        h += `<div class="err" style="margin-bottom:8px">${lg.name} : aucun classement</div>`;
        p.innerHTML = h;
        await sleep(1300);
        continue;
      }
      const tbl = st.table;
      h += `<div class="lhdr"><span>${lg.name}</span></div><div class="sb">`;
      h += '<div class="sth"><span>#</span><span>Équipe</span><span>J</span><span>G</span><span>N</span><span>D</span><span>Pts</span><span>Forme</span></div>';
      tbl.slice(0, 10).forEach((t, i) => {
        const cls = i < lg.chl ? 'chl' : i < (lg.chl + lg.eur) ? 'eur' : '';
        const form = (t.form || '').split(',').map(x => x.trim()).filter(Boolean).slice(-5)
          .map(r => `<div class="fp" style="background:${r==='W'?'#34d399':r==='D'?'#38bdf8':'#f87171'}"></div>`).join('');
        h += `<div class="str ${cls}"><span class="sp">${t.position ?? '-'}</span><div class="st">${crest(t.team?.crest || '',20,'scr')}<span class="sn">${t.team?.shortName || t.team?.name || '?'}</span></div><span class="ss">${t.playedGames ?? 0}</span><span class="ss">${t.won ?? 0}</span><span class="ss">${t.draw ?? 0}</span><span class="ss">${t.lost ?? 0}</span><span class="spt">${t.points ?? 0}</span><div class="fr">${form}</div></div>`;
      });
      h += '</div>';
      p.innerHTML = h;
    } catch(e) {
      h += `<div class="err" style="margin-bottom:8px">${lg.name} : ${e.message}</div>`;
      p.innerHTML = h;
    }
    await sleep(1300);
  }
  standLoaded = true;
}

function goTab(i) {
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',i===j));
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('on',i===j));
  if (i===1 && !calLoaded) loadCal();
  if (i===2) loadResults();
  if (i===3 && !standLoaded) loadStand();
}

function updateClk() {
  const n = new Date();
  document.getElementById('clk').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function updateUpd() {
  const n = new Date();
  document.getElementById('upd').innerHTML = `<span class="upd-live">↻</span> MàJ ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

async function manualRefresh() {
  const btn = document.getElementById('rbtn');
  btn.classList.add('spin');
  const activeIdx = [...document.querySelectorAll('.page')].findIndex(p=>p.classList.contains('on'));
  if (activeIdx===0) await loadLive(false);
  if (activeIdx===1) { calLoaded=false; await loadCal(); }
  if (activeIdx===2) { await loadLive(false); renderResults(); }
  if (activeIdx===3) { standLoaded=false; await loadStand(); }
  updateUpd();
  setTimeout(() => btn.classList.remove('spin'), 500);
}

async function startLiveLoop() {
  if (liveInterval) clearInterval(liveInterval);
  await loadLive(false);
  updateUpd();
  liveInterval = setInterval(async () => {
    if (demoActive) return;
    await loadLive(true);
    updateUpd();
  }, 15000);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
updateClk();
setInterval(updateClk, 15000);
startLiveLoop();

let demoActive=false,demoInterval=null,pressTimer=null;
const DEMO_SLUGS=['all','fra.1','eng.1','esp.1','ger.1','ita.1','uefa.champions','uefa.europa','uefa.europa.conf','ned.1','por.1','bel.1','sco.1','tur.1','gre.1','usa.1','mex.1','bra.1','arg.1','col.1','chi.1','jpn.1','chn.1','aus.1','ksa.1','fifa.world','fifa.friendly','uefa.nations','caf.champions','afc.champions'];
let demoLeagueSlug=null,demoMatchId=null,demoMatchData=null;

function showToast(msg,dur){dur=dur||2800;var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#0d1428;border:1px solid rgba(0,155,222,.4);color:#f0f6ff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;transition:opacity .4s;white-space:nowrap;pointer-events:none;font-family:Outfit,sans-serif';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._h);t._h=setTimeout(function(){t.style.opacity='0';},dur);}

async function findLiveMatch(){
  const todayKey = dateKey(new Date());
  try {
    const allData = await fetchAllScoreboard(todayKey);
    const allEvents = allData.events || [];
    const live = allEvents.find(ev => isLiveEvent(ev));
    if (live) return { event: live, slug: eventLeagueSlug(live, 'all') };
    const scheduled = allEvents.find(ev => (ev?.status?.type?.state || '') === 'pre');
    if (scheduled) return { event: scheduled, slug: eventLeagueSlug(scheduled, 'all') };
    const finished = allEvents.find(ev => isFinishedEvent(ev));
    if (finished) return { event: finished, slug: eventLeagueSlug(finished, 'all') };
  } catch(e) {}

  for (const slug of DEMO_SLUGS) {
    try {
      const data = slug === 'all' ? await fetchAllScoreboard(todayKey) : await fetchLeagueScoreboard(slug, todayKey);
      const events = data.events || [];
      const live = events.find(ev => isLiveEvent(ev));
      if (live) return { event: live, slug: eventLeagueSlug(live, slug) };
    } catch(e){}
  }

  for (const slug of DEMO_SLUGS) {
    try {
      const data = slug === 'all' ? await fetchAllScoreboard(todayKey) : await fetchLeagueScoreboard(slug, todayKey);
      const events = data.events || [];
      const scheduled = events.find(ev => (ev?.status?.type?.state || '') === 'pre');
      if (scheduled) return { event: scheduled, slug: eventLeagueSlug(scheduled, slug) };
      const finished = events.find(ev => isFinishedEvent(ev));
      if (finished) return { event: finished, slug: eventLeagueSlug(finished, slug) };
    } catch(e){}
  }
  return null;
}

async function demoRefresh(){
  if(!demoActive || !demoLeagueSlug || !demoMatchId) return;
  const p=document.getElementById('p0');
  try{
    const s=await fetchSummarySafe(demoLeagueSlug, demoMatchId);
    const hdr=s.header||s.event||{};
    if (!hdr.id) throw new Error('summary vide');
    const{home,away}=getCompetitors(hdr);
    const norm={
      ...demoMatchData,
      leagueSlug:eventLeagueSlug(hdr,demoLeagueSlug),
      leagueName:eventLeagueName(hdr,demoMatchData?.leagueName||demoLeagueSlug),
      homeScore:home.score??demoMatchData.homeScore,
      awayScore:away.score??demoMatchData.awayScore,
      status:hdr.status||demoMatchData.status,
      details:s.details||hdr.competitions?.[0]?.details||[],
      homeTeamId: home.team?.id || demoMatchData.homeTeamId,
      awayTeamId: away.team?.id || demoMatchData.awayTeamId,
    };
    demoMatchData = norm;
    const state=hdr.status?.type?.state||'';
    if(state==='post'){ clearInterval(demoInterval); demoInterval=null; showToast('Match terminé'); }
    const bar='<div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:8px 14px;margin-bottom:10px;font-size:10px;font-weight:800;color:#fbbf24;text-align:center">🧪 MODE DÉMO — APPUI LONG SUR VL POUR QUITTER</div>';
    document.getElementById('liveDot').style.display='block';
    p.innerHTML='<div class="sec">Mode démo</div>'+bar+renderMatch(norm);
    updateUpd();
  }catch(e){
    const bar='<div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:8px 14px;margin-bottom:10px;font-size:10px;font-weight:800;color:#fbbf24;text-align:center">🧪 MODE DÉMO — APPUI LONG SUR VL POUR QUITTER</div>';
    p.innerHTML='<div class="sec">Mode démo</div>'+bar+renderMatch(demoMatchData);
  }
}

async function startDemo(){
  if(demoActive){ stopDemo(); return; }
  showToast('🔍 Recherche d un match...',8000);
  goTab(0);
  const found=await findLiveMatch();
  if(!found){ showToast('Aucun match trouvé',3000); return; }
  demoActive=true;
  demoLeagueSlug=found.slug || eventLeagueSlug(found.event,'all');
  demoMatchId=found.event.id;
  demoMatchData=normalizeEvent(found.event,eventLeagueName(found.event,demoLeagueSlug),demoLeagueSlug);
  if(liveInterval){ clearInterval(liveInterval); liveInterval=null; }
  await demoRefresh();
  demoInterval=setInterval(demoRefresh,15000);
  showToast('🧪 '+demoMatchData.homeName+' vs '+demoMatchData.awayName);
}

function stopDemo(){
  demoActive=false; demoMatchData=null; demoLeagueSlug=null; demoMatchId=null;
  if(demoInterval){ clearInterval(demoInterval); demoInterval=null; }
  document.getElementById('liveDot').style.display='none';
  startLiveLoop();
  showToast('Mode démo désactivé');
}

var logoEl=document.getElementById('logoMark');
if(logoEl){

  logoEl.addEventListener('pointerup',function(){ clearTimeout(pressTimer); });

}
